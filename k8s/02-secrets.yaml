# ============================================================
# Kubernetes Secret Template
#
# This file documents the secrets needed for the application.
# DO NOT commit real secrets - this is a template only.
#
# To create secrets manually, run:
#   kubectl create secret generic proveo-secrets \
#     --namespace=proveo \
#     --from-literal=DATABASE_URL="your-db-url" \
#     --from-literal=DATABASE_URL_PRIMARY="your-primary-db-url" \
#     --from-literal=DATABASE_URL_REPLICA="your-replica-db-url" \
#     --from-literal=ALEMBIC_DATABASE_URL="your-alembic-db-url" \
#     --from-literal=REDIS_URL="your-redis-url" \
#     --from-literal=SECRET_KEY="your-jwt-secret" \
#     --from-literal=ADMIN_EMAIL="your-admin@email.com" \
#     --from-literal=RESEND_API_KEY="your-resend-key"
#
# Or use the deploy script which handles this automatically.
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: proveo-secrets
  namespace: proveo
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://user:password@postgres-primary:5432/proveo"
  DATABASE_URL_PRIMARY: "postgresql://user:password@postgres-primary:5432/proveo"
  DATABASE_URL_REPLICA: "postgresql://user:password@postgres-replica:5432/proveo"
  ALEMBIC_DATABASE_URL: "postgresql://user:password@postgres-primary:5432/proveo"

  # Cache
  REDIS_URL: "redis://redis:6379/0"

  # Auth
  SECRET_KEY: "REPLACE_WITH_SECURE_RANDOM_KEY"

  # Email
  ADMIN_EMAIL: "admin@yourdomain.com"
  RESEND_API_KEY: "REPLACE_WITH_RESEND_API_KEY"

  # MinIO
  MINIO_ROOT_USER: "REPLACE_WITH_MINIO_USER"
  MINIO_ROOT_PASSWORD: "REPLACE_WITH_MINIO_PASSWORD"

  # PostgreSQL
  POSTGRES_USER: "REPLACE_WITH_PG_USER"
  POSTGRES_PASSWORD: "REPLACE_WITH_PG_PASSWORD"
  POSTGRES_DB: "proveo"