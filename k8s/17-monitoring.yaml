# =============================================================================
# 17-monitoring.yaml — Grafana + Loki + Alloy + user init Job
#
# Namespace: portfolio (same as the app — single environment, no separation needed)
#
# Secret: monitoring-secrets is created by deploy-k3s-local.sh from the
# password files before this manifest is applied. Do not define it here.
#
# Grafana is publicly accessible via nginx at /grafana/
# No port-forwarding needed.
#
# ACCESS:
#   https://testproveoportfolio.xyz/grafana/
#   Admin:  admin / <contents of .grafana-admin-password>
#   Demo:   demo  / <contents of .grafana-demo-password>  (Viewer only)
#
# VERSIONS:
#   Loki:    3.5.0  (boltdb-shipper + schema v11 deprecated in 3.0, using TSDB + v13)
#   Alloy:   v1.9.2 (Promtail EOL March 2026, Alloy is the official replacement)
#   Grafana: 10.2.0
#
# MEMORY: ~320Mi actual across all three pods
# =============================================================================

---
# =============================================================================
# LOKI — stores and indexes the logs
# Upgraded to 3.5.0 with TSDB storage (boltdb-shipper deprecated in 3.0)
#
# Loki TSDB indexes ONLY labels/streams, not full log contents.
# Query flow is roughly:
#   LogQL label selector -> TSDB index lookup -> matching streams/chunks
#   -> fetch compressed chunks from object storage -> scan/filter log lines
#
# Internally the TSDB index behaves closer to an inverted index/postings-list
# system (similar to Prometheus TSDB/Lucene concepts) than a classic mutable
# B-tree SQL index. Immutable index blocks + chunk metadata allow efficient
# distributed queries and query sharding.
#
# High-cardinality labels (request_id, random UUIDs, per-user labels, etc.)
# can explode index size and hurt query/storage performance.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: portfolio
data:
  loki.yaml: |
    # auth_enabled: false disables multi-tenancy. All logs go into a single
    # "fake" tenant. Required for single-node deployments — if true, every
    # push/query request must include an X-Scope-OrgID header.
    # https://grafana.com/docs/loki/latest/configure/#auth_enabled
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    # The common block is a Loki 3.x convenience that sets shared defaults
    # for path_prefix, storage, replication_factor, and ring — avoiding
    # repetition across the ingester, compactor, and ruler sections.
    # loki rules are alerts you can set fro example when too many 500 errors are present in the records.
    # https://grafana.com/docs/loki/latest/configure/#common
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      # replication_factor: 1 is correct for single-node. Values > 1 require
      # multiple ingesters and a distributed ring (Consul or etcd).
      # https://grafana.com/docs/loki/latest/configure/#common
      replication_factor: 1
      ring:
        # instance_addr: 127.0.0.1 advertises this Loki instance as localhost
        # inside the ring. This is correct only for a single-node deployment:
        # there are no other ingesters/distributors that need to reach this node
        # over the network. In a distributed cluster this would be the pod IP,
        # service DNS name, or host IP so other Loki nodes can coordinate writes,
        # replication, ownership, and health through the ring.
        #
        # kvstore: inmemory stores ring state only in this process' RAM.
        # Correct for single-node Loki because there is no distributed cluster
        # state to share or coordinate. Multi-node Loki requires a shared ring
        # backend (memberlist/Consul/etcd) so nodes can agree on:
        #   - which ingesters are alive
        #   - which node owns which hash ranges/streams
        #   - where replicas live
        #   - where distributors should route writes
        #
        # Without a shared distributed kvstore, each node would have an isolated,
        # inconsistent view of the ring and clustering would break.
        # https://grafana.com/docs/loki/latest/configure/#ring
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    # schema_config defines HOW Loki organises log data on disk/object storage:
    #   - which index backend to use (tsdb vs old boltdb-shipper)
    #   - which object store holds chunks/indexes (filesystem, S3, GCS, etc.)
    #   - which schema version defines the on-disk layout
    #   - how index tables/blocks are partitioned over time
    #
    # Loki stores logs in two major pieces:
    #   1. compressed log chunks (actual log lines)
    #   2. indexes mapping labels/streams -> chunk references
    #
    # schema_config tells Loki how to interpret BOTH pieces for a given time range.
    # This matters because storage formats evolve across Loki versions.
    #
    # Multiple schema entries are allowed because old logs may have been written
    # using different backends or layouts. Loki selects the correct schema entry
    # dynamically based on the log timestamp being queried.
    #
    # Example:
    #   logs from 2025 -> boltdb-shipper + schema v11
    #   logs from 2026 -> TSDB + schema v13
    #
    # During queries Loki transparently reads both formats, allowing migrations
    # without reindexing or deleting historical data.
    #
    # Adding a new schema entry is the standard migration path when changing:
    #   - index backend
    #   - object storage backend
    #   - schema version
    #
    # IMPORTANT:
    # Never modify old schema entries retroactively once data exists.
    # Existing chunks/indexes were physically written using that layout.
    # Changing old entries can make historical logs unreadable.
    #
    # The `from:` date acts as a cutover point:
    # logs with timestamps >= from use that schema entry.
    #
    # https://grafana.com/docs/loki/latest/configure/storage/#schema-config
    schema_config:
      configs:
        - from: 2026-01-01
          # store: tsdb is the current index backend as of Loki 3.0.
          # boltdb-shipper was deprecated in 3.0 and removed in a later release.
          # https://grafana.com/docs/loki/latest/operations/storage/tsdb/
          store: tsdb
          object_store: filesystem
          # schema: v13 is required for TSDB. v11/v12 only worked with boltdb-shipper.
          # https://grafana.com/docs/loki/latest/configure/storage/#schema-versions
          schema: v13
          index:
            prefix: index_
            # period: 24h creates one index table per day. The only supported
            # value for TSDB — weekly periods are a boltdb-shipper concept.
            # https://grafana.com/docs/loki/latest/operations/storage/tsdb/#index-period
            period: 24h

    limits_config:
      # reject_old_samples blocks ingestion of logs older than
      # reject_old_samples_max_age. Prevents backfill from bloating the index
      # and keeps query performance predictable.
      # https://grafana.com/docs/loki/latest/configure/#limits_config
      reject_old_samples: true
      reject_old_samples_max_age: 72h
      # ingestion_rate_mb and ingestion_burst_size_mb are per-tenant rate limits
      # on how fast logs can be pushed to Loki. With auth_enabled: false there
      # is effectively one tenant, so this is a global ingest cap.
      # https://grafana.com/docs/loki/latest/operations/request-validation-rate-limits/
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6
      # retention_period in limits_config is the Loki 3.x way to configure
      # how long logs are kept. The compactor enforces this — it will not
      # delete anything unless retention_enabled: true is also set below.
      # https://grafana.com/docs/loki/latest/operations/storage/retention/
      retention_period: 72h

    compactor:
      working_directory: /loki/compactor
      # retention_enabled: true activates the compactor's deletion loop.
      # Without this, retention_period above is ignored and logs accumulate forever.
      # https://grafana.com/docs/loki/latest/operations/storage/retention/#configuring-the-retention-period
      retention_enabled: true
      # delete_request_store must match the object_store in schema_config.
      # https://grafana.com/docs/loki/latest/configure/#compactor
      delete_request_store: filesystem

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      name: http
  selector:
    app: loki

---
# Loki is a StatefulSet — StatefulSets update pods one at a time and guarantee
# that the same pod name always gets the same PVC, so there is no mount conflict
# during rolling updates with a ReadWriteOnce volume.
# https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory owned by root.
        # Loki runs as UID/GID 10001 and will fail to write chunks or index
        # files unless ownership is fixed before the main container starts.
        # https://github.com/grafana/loki/blob/main/production/docker/Dockerfile
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /loki"]
          volumeMounts:
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: loki
          image: grafana/loki:3.5.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          # /ready returns HTTP 200 once Loki has finished loading the index
          # and is ready to accept push and query requests.
          # https://grafana.com/docs/loki/latest/reference/api/#identify-ready-loki-instance
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data

---
# =============================================================================
# ALLOY — collects logs from the temporal-worker pod and ships to Loki
#
# Replaces Promtail (EOL March 2026). Alloy is the official Grafana collector.
# Uses loki.source.kubernetes which reads from the Kubernetes API directly —
# no hostPath volume needed, no dependency on the node filesystem layout.
# https://grafana.com/docs/alloy/latest/reference/components/loki/loki.source.kubernetes/
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: portfolio

---
# =============================================================================
# RBAC — how Alloy gets permission to call the Kubernetes API
#
# Every pod in Kubernetes runs as a ServiceAccount. If you don't specify one,
# it uses the "default" ServiceAccount in its namespace, which has no API
# permissions by default.
#
# Kubernetes automatically mounts a ServiceAccount token into every pod at:
#   /var/run/secrets/kubernetes.io/serviceaccount/token
#
# That token is a short-lived JWT signed by the cluster's API server. When
# Alloy calls the Kubernetes API (to list pods, stream logs, etc.) it sends
# this token in the Authorization header. The API server validates the JWT
# and checks RBAC to decide if the call is allowed.
#
# The three objects below wire this together:
#
#   ServiceAccount (alloy)
#     └─ Identity: gives Alloy a named principal ("alloy" in "portfolio")
#
#   ClusterRole (alloy)
#     └─ Permission set: defines what API calls are allowed and on what resources
#
#   ClusterRoleBinding (alloy)
#     └─ Binding: says "the alloy ServiceAccount has the alloy ClusterRole"
#
# Without the binding, the ServiceAccount and ClusterRole exist but are
# completely disconnected — Alloy would still get 403s on every API call.
#
# ClusterRole (not Role) is used because loki.source.kubernetes needs to
# read pod metadata and log streams cluster-wide, even though the Alloy
# config later filters down to the "portfolio" namespace in application logic.
# RBAC does not know or care about your Alloy config — permissions are
# evaluated at the API server level before your app even sees the response.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods, pods/log]
    verbs: [get, watch, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: portfolio

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: portfolio
data:
  config.alloy: |
    // =============================================================================
    // ALLOY PIPELINE OVERVIEW
    //
    // Alloy is a data pipeline. You wire components together by passing the output
    // of one into the input of the next. The flow for this config is:
    //
    //   discovery.kubernetes   →   discovery.relabel   →   loki.source.kubernetes
    //                                                              ↓
    //                                                       loki.process
    //                                                              ↓
    //                                                        loki.write
    //
    // Step 1 — DISCOVER:  ask the k8s API "what pods exist right now?"
    // Step 2 — FILTER:    keep only the pods we care about, rename their metadata
    //                     into labels we actually want to query on in Loki
    // Step 3 — COLLECT:   open a log stream for each surviving target (like kubectl logs --follow)
    // Step 4 — PROCESS:   parse each JSON log line, promote fields into Loki stream labels
    // Step 5 — SHIP:      push batched log entries to Loki's HTTP ingest API
    // =============================================================================


    // =============================================================================
    // STEP 1 — DISCOVER pods via the Kubernetes API
    //
    // discovery.kubernetes continuously watches the k8s API for pods in the given
    // namespaces. It returns a live list of "targets" — one per running container.
    //
    // Each target is a bag of labels. Most are raw k8s metadata prefixed with
    // __meta_kubernetes_*, for example:
    //
    //   __meta_kubernetes_pod_name              = "temporal-worker-7d9f4b-xkzqp"
    //   __meta_kubernetes_namespace             = "portfolio"
    //   __meta_kubernetes_pod_label_app         = "temporal-worker"
    //   __meta_kubernetes_pod_container_name    = "temporal-worker"
    //   __meta_kubernetes_pod_node_name         = "my-node"
    //   __address__                             = "10.42.0.17:8080"
    //   ... (dozens more)
    //
    // These __meta_* labels are internal to the discovery/relabel pipeline.
    // They are NOT automatically forwarded to Loki as stream labels — you have
    // to explicitly promote the ones you want in discovery.relabel below.
    //
    // role = "pod" means one target per container (a pod with 2 containers = 2 targets).
    // Other roles: "node", "service", "endpoints", "ingress" — not needed here.
    // https://grafana.com/docs/alloy/latest/reference/components/discovery/discovery.kubernetes/
    // =============================================================================
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        // Scope discovery to only this namespace. Without this, Alloy would
        // watch every pod in the entire cluster, which is wasteful and noisy.
        names = ["portfolio"]
      }
    }


    // =============================================================================
    // STEP 2 — FILTER and RELABEL targets
    //
    // discovery.relabel takes the full list of targets from discovery.kubernetes
    // and runs each one through a sequence of rules top-to-bottom.
    //
    // Rules have two jobs:
    //   A) FILTER — drop targets you don't want (action: keep / action: drop)
    //   B) RELABEL — reshape the label set you do want (action: replace)
    //
    // The output of this block (discovery.relabel.temporal_worker.output) is a
    // filtered, relabeled list of targets that loki.source.kubernetes will open
    // log streams for. Only targets that survive all "keep" rules make it through.
    //
    // https://grafana.com/docs/alloy/latest/reference/components/discovery/discovery.relabel/
    // =============================================================================
    discovery.relabel "temporal_worker" {
      targets = discovery.kubernetes.pods.targets

      // ── FILTER ──────────────────────────────────────────────────────────────
      // action: keep means: evaluate the regex against source_labels.
      // If it MATCHES → keep the target and continue to the next rule.
      // If it DOES NOT match → drop the target entirely. No further rules run.
      //
      // __meta_kubernetes_pod_label_app contains the value of the pod's
      // "app" label from its Kubernetes metadata (i.e. what you wrote under
      // labels: in the pod spec). Here we keep only pods where app=temporal-worker.
      //
      // Every other pod in the "portfolio" namespace — nginx, grafana, loki, etc.
      // — is silently discarded at this point. They never get a log stream opened.
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "keep"
        regex         = "temporal-worker"
      }

      // ── RELABEL ─────────────────────────────────────────────────────────────
      // action: replace copies the value of source_labels into target_label,
      // renaming it to something short and human-readable.
      //
      // WHY this matters: Loki organizes logs into "streams" identified by a
      // set of key=value labels. Those labels are what you filter on in LogQL:
      //
      //   {app="temporal-worker", level="error"}
      //   {namespace="portfolio", pod=~"temporal-worker-.*"}
      //
      // If you skip this relabeling step, the raw __meta_kubernetes_* labels
      // do NOT automatically become Loki stream labels. Your logs would land
      // in Loki with no queryable metadata attached — just raw log lines with
      // no way to filter by pod, namespace, or container.
      //
      // Each rule below promotes one piece of k8s metadata into a plain label
      // that Loki will index and that LogQL can match against.

      // Becomes: namespace="portfolio"
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action        = "replace"
        target_label  = "namespace"
      }

      // Becomes: pod="temporal-worker-7d9f4b-xkzqp"
      // Useful for querying logs from a specific pod replica.
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        action        = "replace"
        target_label  = "pod"
      }

      // Becomes: container="temporal-worker"
      // Useful when a pod has multiple containers (init containers, sidecars).
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        action        = "replace"
        target_label  = "container"
      }

      // Becomes: app="temporal-worker"
      // Copied from the pod's own "app" label — the same one we filtered on above.
      // Having it as a plain Loki label lets you query {app="temporal-worker"}
      // without needing to know individual pod names.
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "replace"
        target_label  = "app"
      }
    }


    // =============================================================================
    // STEP 3 — OPEN log streams for each surviving target
    //
    // loki.source.kubernetes takes the filtered+relabeled target list and calls
    // the Kubernetes API to stream logs from each one — identical to running:
    //   kubectl logs --follow <pod> -c <container> -n portfolio
    //
    // This happens entirely over the k8s API using the ServiceAccount token
    // mounted into the Alloy pod. No hostPath volume, no access to the node's
    // /var/log/containers directory, no privileged mode required.
    //
    // As new pods matching our filter appear (restarts, rollouts), Alloy
    // automatically picks them up via the live watch from discovery.kubernetes.
    // Deleted pods are automatically dropped.
    //
    // Each log line is forwarded as-is to the next stage for processing.
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.source.kubernetes/
    // =============================================================================
    loki.source.kubernetes "temporal_worker" {
      targets    = discovery.relabel.temporal_worker.output
      forward_to = [loki.process.parse_json.receiver]
    }


    // =============================================================================
    // STEP 4 — PROCESS each log line through a parsing pipeline
    //
    // loki.process runs every incoming log line through a sequence of stages.
    // The temporal-worker emits structured JSON logs, e.g.:
    //
    //   {"level":"info","event":"workflow_started","workflow_id":"abc123","ts":1234567890}
    //
    // We parse that JSON and selectively promote certain fields into Loki stream
    // labels so they can be used in LogQL label matchers.
    //
    // IMPORTANT — cardinality tradeoff:
    //   Loki indexes stream labels. High-cardinality labels (workflow_id, user_id,
    //   request_id — fields with millions of unique values) bloat the index and
    //   destroy query performance. Only promote low-cardinality fields as labels.
    //
    //   Fields NOT promoted here (e.g. workflow_id, ts) are still fully queryable
    //   in LogQL using the JSON parser inline:
    //     {app="temporal-worker"} | json | workflow_id="abc123"
    //   They just aren't indexed — Loki scans the raw chunk content for them.
    //
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.process/
    // =============================================================================
    loki.process "parse_json" {

      // stage.json parses the raw log line as JSON and extracts specific fields
      // into Alloy's internal per-entry state (not yet Loki labels).
      //
      // Format: fieldName = "json_key"
      // The left side is the internal variable name used in later stages.
      // The right side is the key path in the JSON object.
      stage.json {
        expressions = {
          level = "level",
          event = "event",
        }
      }

      // stage.labels promotes the extracted fields from internal state into
      // actual Loki stream labels that get indexed and are usable in LogQL.
      //
      // Empty string value means "use the value extracted by the same name
      // from stage.json above". After this stage, every log line from
      // temporal-worker lands in Loki with labels like:
      //
      //   {app="temporal-worker", namespace="portfolio", level="error", event="task_failed"}
      //
      // You can now query: {app="temporal-worker", level="error"} in Grafana Explore.
      stage.labels {
        values = {
          level = "",
          event = "",
        }
      }

      forward_to = [loki.write.loki.receiver]
    }


    // =============================================================================
    // STEP 5 — SHIP log entries to Loki
    //
    // loki.write receives batched log entries and POSTs them to Loki's push API.
    //
    // Uses the cluster-internal DNS name (loki.portfolio.svc.cluster.local)
    // instead of an IP address. Kubernetes DNS guarantees this resolves to the
    // correct ClusterIP even after pod restarts or service changes — no hardcoded
    // IPs, no ingress, no port-forwarding needed for internal cluster traffic.
    //
    // Format: <service-name>.<namespace>.svc.cluster.local:<port>
    //
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.write/
    // =============================================================================
    loki.write "loki" {
      endpoint {
        url = "http://loki.portfolio.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

---
# DaemonSet ensures one Alloy pod runs on every node. On a single-node cluster
# this is equivalent to a single-replica Deployment but is the correct
# primitive for log collectors — if nodes are added, Alloy scales automatically.
# https://grafana.com/docs/alloy/latest/set-up/install/kubernetes/
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: portfolio
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.9.2
          args:
            - run
            - /etc/alloy/config.alloy
            # --storage.path is where Alloy persists WAL (write-ahead log) and
            # component state. /tmp is acceptable here — Alloy will recover from
            # Loki on restart and the WAL is not the source of truth.
            # https://grafana.com/docs/alloy/latest/reference/cli/run/
            - --storage.path=/tmp/alloy
            # this is the address that the cluster can use to comunnicate with  this container
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            # 12345 exposes Alloy's own metrics and UI for debugging.
            # https://grafana.com/docs/alloy/latest/troubleshoot/debug/
            - containerPort: 12345
              name: http-metrics
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: alloy-config

---
# =============================================================================
# GRAFANA — dashboard UI, served publicly at /grafana/ via nginx
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: portfolio
data:
  # Provisioned datasources are loaded at startup and cannot be edited or
  # deleted from the UI — they are managed as code.
  # https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        # access: proxy means Grafana's backend makes the request to Loki,
        # not the browser. Required when Loki is on a private ClusterIP.
        # https://grafana.com/docs/grafana/latest/datasources/loki/
        access: proxy
        url: http://loki.portfolio.svc.cluster.local:3100
        isDefault: true
        jsonData:
          # maxLines caps how many log lines a single query returns in Explore.
          # Does not affect dashboard panels — those are capped by their own query settings.
          # https://grafana.com/docs/grafana/latest/datasources/loki/#configure-the-data-source
          maxLines: 1000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  # grafana-data is a ReadWriteOnce PVC — only one pod can mount it at a time.
  # RollingUpdate would start the new pod before terminating the old one,
  # causing both to compete for the same RWO volume. The new pod gets stuck
  # in ContainerCreating indefinitely.
  # Recreate terminates the old pod first, releases the PVC, then starts the new pod.
  # https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#recreate-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory owned by root.
        # Grafana runs as UID/GID 472 and cannot write its SQLite database
        # unless ownership is fixed before the main container starts.
        # https://github.com/grafana/grafana/blob/main/Dockerfile
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            # GF_SECURITY_ADMIN_USER and GF_SECURITY_ADMIN_PASSWORD set the
            # built-in admin credentials on first boot. On subsequent boots
            # Grafana ignores these if the admin user already exists in the DB.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#security
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            # GF_SERVER_ROOT_URL tells Grafana its full public URL.
            # Without this, post-login redirects point to / instead of /grafana/
            # and OAuth callbacks break.
            # GF_SERVER_SERVE_FROM_SUB_PATH prefixes all asset URLs with /grafana/
            # so the browser can resolve JS and CSS through the nginx proxy.
            # Without it, the UI loads blank — every asset request gets a 404.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#serve_from_sub_path
            - name: GF_SERVER_ROOT_URL
              value: "https://testproveoportfolio.xyz/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            # Disable anonymous access — all users must log in.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-security/configure-authentication/grafana/
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            # Disable self-registration — accounts are created by the admin only.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-security/configure-authentication/grafana/#allow-sign-up
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # Disable phone-home telemetry and update checks.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#analytics
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          # /api/health returns HTTP 200 when Grafana is fully initialised
          # and its database migrations have completed.
          # https://grafana.com/docs/grafana/latest/developers/http_api/other/#returns-health-information-about-grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources

---
# =============================================================================
# GRAFANA USER INIT — one-shot Job, runs after Grafana is healthy
#
# Admin is created automatically by Grafana from GF_SECURITY_ADMIN_* above.
# Passwords are injected directly from the secret as env vars — no service
# account, no Kubernetes API calls, no RBAC needed.
#
# Jobs are immutable in Kubernetes — kubectl apply fails if a completed Job
# already exists in the namespace. rolling-deploy.sh deletes it before apply.
#
# Re-run manually:
#   kubectl delete job grafana-init-users -n portfolio
#   kubectl apply -f k8s/17-monitoring.yaml
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-init-users
  namespace: portfolio
spec:
  # ttlSecondsAfterFinished deletes the Job and its pod automatically after
  # 5 minutes, keeping the namespace clean without deploy script intervention.
  # https://kubernetes.io/docs/concepts/workloads/controllers/job/#ttl-mechanism-for-finished-jobs
  ttlSecondsAfterFinished: 300
  # backoffLimit: 5 retries the pod up to 5 times on failure before the Job
  # is marked as failed. Each retry is a fresh pod — useful here because
  # Grafana may not be ready immediately and the first curl will fail.
  # https://kubernetes.io/docs/concepts/workloads/controllers/job/#pod-backoff-failure-policy
  backoffLimit: 5
  template:
    spec:
      # OnFailure restarts the container in the same pod on non-zero exit.
      # Never is the other valid option for Jobs — do not use Always (that is
      # for Deployments and will be rejected here).
      # https://kubernetes.io/docs/concepts/workloads/controllers/job/#handling-pod-and-container-failures
      restartPolicy: OnFailure
      containers:
      - name: init
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache curl > /dev/null 2>&1

          GRAFANA="http://grafana.portfolio.svc.cluster.local:3000"

          echo "Waiting for Grafana..."
          until curl -sf -u "admin:${ADMIN_PASS}" "$GRAFANA/api/health" > /dev/null 2>&1; do
            sleep 3
          done
          echo "Grafana is up"

          # GET /api/users/lookup returns 200 if the user exists, 404 if not.
          # https://grafana.com/docs/grafana/latest/developers/http_api/user/#get-user-by-login-or-email
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "admin:${ADMIN_PASS}" \
            "$GRAFANA/api/users/lookup?loginOrEmail=demo")

          if [ "$HTTP_STATUS" = "200" ]; then
            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)
            # PUT /api/admin/users/:id/password updates the password for any user.
            # https://grafana.com/docs/grafana/latest/developers/http_api/admin/#set-user-password
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X PUT \
              -d "{\"password\":\"${DEMO_PASS}\"}" \
              "$GRAFANA/api/admin/users/${USER_ID}/password" > /dev/null
            echo "Demo user updated (user ID: $USER_ID)"
          else
            # POST /api/admin/users creates a new global user (server admin endpoint).
            # https://grafana.com/docs/grafana/latest/developers/http_api/admin/#create-global-user
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X POST \
              -d "{\"name\":\"Demo\",\"email\":\"demo@local\",\"login\":\"demo\",\"password\":\"${DEMO_PASS}\",\"OrgId\":1}" \
              "$GRAFANA/api/admin/users" > /dev/null
            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)
            # PATCH /api/orgs/:orgId/users/:userId sets the user's role within
            # the org. Viewer can see dashboards but cannot edit or create anything.
            # https://grafana.com/docs/grafana/latest/developers/http_api/org/#updates-the-given-user
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X PATCH \
              -d "{\"role\":\"Viewer\"}" \
              "$GRAFANA/api/orgs/1/users/${USER_ID}" > /dev/null
            echo "Demo user created as Viewer (user ID: $USER_ID)"
          fi
        env:
          - name: ADMIN_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_SECURITY_ADMIN_PASSWORD
          - name: DEMO_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_DEMO_PASSWORD
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"