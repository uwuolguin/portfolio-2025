# =============================================================================
# 17-monitoring.yaml — Grafana + Loki + Alloy + user init Job
#
# Namespace: portfolio (same as the app — single environment, no separation needed)
#
# Secret: monitoring-secrets is created by deploy-k3s-local.sh from the
# password files before this manifest is applied. Do not define it here.
#
# Grafana is publicly accessible via nginx at /grafana/
# No port-forwarding needed.
#
# ACCESS:
#   https://testproveoportfolio.xyz/grafana/
#   Admin:  admin / <contents of .grafana-admin-password>
#   Demo:   demo  / <contents of .grafana-demo-password>  (Viewer only)
#
# VERSIONS:
#   Loki:    3.5.0  (boltdb-shipper + schema v11 deprecated in 3.0, using TSDB + v13)
#   Alloy:   v1.9.2 (Promtail EOL March 2026, Alloy is the official replacement)
#   Grafana: 10.2.0
#
# MEMORY: ~320Mi actual across all three pods
# =============================================================================

---
# =============================================================================
# LOKI — stores and indexes the logs
# Upgraded to 3.5.0 with TSDB storage (boltdb-shipper deprecated in 3.0)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: portfolio
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    # common block simplifies single-node configuration in Loki 3.x
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2026-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 72h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6
      # retention_period in limits_config is the Loki 3.x way to set retention
      retention_period: 72h

    compactor:
      working_directory: /loki/compactor
      # retention_enabled tells the compactor to delete chunks older than retention_period
      retention_enabled: true
      # required when retention is enabled — tells the compactor where to store
      # delete requests. must match the store type (tsdb in our case)
      delete_request_store: tsdb

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      name: http
  selector:
    app: loki

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory as root.
        # chown to UID/GID 10001 (loki user) before the main process starts
        # so Loki can write chunks and index files.
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /loki"]
          volumeMounts:
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: loki
          image: grafana/loki:3.5.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data

---
# =============================================================================
# ALLOY — collects logs from the temporal-worker pod and ships to Loki
#
# Replaces Promtail (EOL March 2026). Alloy is the official Grafana collector.
# Uses loki.source.kubernetes which reads from the Kubernetes API directly —
# no hostPath volume needed, no dependency on the node filesystem layout.
#
# Config reference: https://grafana.com/docs/alloy/latest/collect/logs-in-kubernetes/
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: portfolio

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods, pods/log]
    verbs: [get, watch, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: portfolio

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: portfolio
data:
  config.alloy: |
    // Discover all pods in the portfolio namespace
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["portfolio"]
      }
    }

    // Filter to temporal-worker only and set up labels.
    discovery.relabel "temporal_worker" {
      targets = discovery.kubernetes.pods.targets

      // Drop everything that is not the temporal-worker pod
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "keep"
        regex         = "temporal-worker"
      }

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action        = "replace"
        target_label  = "namespace"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        action        = "replace"
        target_label  = "pod"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        action        = "replace"
        target_label  = "container"
      }

      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "replace"
        target_label  = "app"
      }
    }

    // Read logs from the temporal-worker pod via the Kubernetes API.
    // loki.source.kubernetes streams logs without needing hostPath mounts.
    loki.source.kubernetes "temporal_worker" {
      targets    = discovery.relabel.temporal_worker.output
      forward_to = [loki.process.parse_json.receiver]
    }

    // Parse JSON log lines and promote level + event as stream labels.
    // Everything else is available at query time via | json in LogQL.
    loki.process "parse_json" {
      stage.json {
        expressions = {
          level = "level",
          event = "event",
        }
      }

      stage.labels {
        values = {
          level = "",
          event = "",
        }
      }

      forward_to = [loki.write.loki.receiver]
    }

    // Write to Loki
    loki.write "loki" {
      endpoint {
        url = "http://loki.portfolio.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: portfolio
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.9.2
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/tmp/alloy
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - containerPort: 12345
              name: http-metrics
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: alloy-config

---
# =============================================================================
# GRAFANA — dashboard UI, served publicly at /grafana/ via nginx
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: portfolio
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.portfolio.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory as root.
        # chown to UID/GID 472 (grafana user) before the main process starts
        # so Grafana can write its database and config files.
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            # ── Subpath serving: required for nginx /grafana/ proxy ──
            # Without these two, Grafana builds asset URLs relative to /
            # (e.g. /public/build/app.js) and the browser gets 404s for
            # every JS and CSS file — the UI loads blank.
            # GF_SERVER_ROOT_URL tells Grafana what its full public URL is
            # so post-login redirects point to the right place.
            # GF_SERVER_SERVE_FROM_SUB_PATH prefixes all asset paths with
            # /grafana/ so they resolve correctly through nginx.
            - name: GF_SERVER_ROOT_URL
              value: "https://testproveoportfolio.xyz/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources

---
# =============================================================================
# GRAFANA USER INIT — one-shot Job, runs after Grafana is healthy
#
# Admin is created automatically by Grafana from GF_SECURITY_ADMIN_* above.
# Passwords are injected directly from the secret as env vars — no service
# account, no Kubernetes API calls, no RBAC needed.
#
# Re-run manually:
#   kubectl delete job grafana-init-users -n portfolio
#   kubectl apply -f k8s/17-monitoring.yaml
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-init-users
  namespace: portfolio
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache curl > /dev/null 2>&1

          GRAFANA="http://grafana.portfolio.svc.cluster.local:3000"

          echo "Waiting for Grafana..."
          until curl -sf -u "admin:${ADMIN_PASS}" "$GRAFANA/api/health" > /dev/null 2>&1; do
            sleep 3
          done
          echo "Grafana is up"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "admin:${ADMIN_PASS}" \
            "$GRAFANA/api/users/lookup?loginOrEmail=demo")

          if [ "$HTTP_STATUS" = "200" ]; then
            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X PUT \
              -d "{\"password\":\"${DEMO_PASS}\"}" \
              "$GRAFANA/api/admin/users/${USER_ID}/password" > /dev/null
            echo "Demo user updated (user ID: $USER_ID)"
          else
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X POST \
              -d "{\"name\":\"Demo\",\"email\":\"demo@local\",\"login\":\"demo\",\"password\":\"${DEMO_PASS}\",\"OrgId\":1}" \
              "$GRAFANA/api/admin/users" > /dev/null
            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)
            curl -sf -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" -X PATCH \
              -d "{\"role\":\"Viewer\"}" \
              "$GRAFANA/api/orgs/1/users/${USER_ID}" > /dev/null
            echo "Demo user created as Viewer (user ID: $USER_ID)"
          fi
        env:
          - name: ADMIN_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_SECURITY_ADMIN_PASSWORD
          - name: DEMO_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_DEMO_PASSWORD
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"