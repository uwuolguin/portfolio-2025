# =============================================================================
# LOKI — stores and indexes the logs
# Upgraded to 3.5.0 with TSDB storage (boltdb-shipper deprecated in 3.0)
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │                        LOKI COMPONENT ARCHITECTURE                      │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Loki is not a single program — it is a collection of components that can
# run as separate processes (microservices mode) or all inside one process
# (monolithic mode, which is what this single-node deployment uses).
# Understanding each component is essential for understanding why logs are
# stored the way they are, why the ring exists, and why deletion works the
# way it does.
#
# The full data path looks like this:
#
#   [Alloy / Promtail]
#         │  HTTP POST /loki/api/v1/push
#         ▼
#   ┌─────────────┐
#   │ Distributor │  ← traffic cop, validator, hash router
#   └──────┬──────┘
#          │  consistent-hash ring lookup → picks Ingester(s)
#          ▼
#   ┌─────────────┐
#   │  Ingester   │  ← writes RAM head block + WAL, flushes immutable blocks
#   └──────┬──────┘
#          │  flush to object storage (filesystem here, S3 in prod)
#          ▼
#   ┌──────────────────────────────────┐
#   │  Object Storage  (block files)   │  ← immutable once written
#   │   Block 001/  Block 002/  ...    │
#   │     index                        │
#   │     chunks/                      │
#   └────────────┬─────────────────────┘
#                │  periodic compaction + retention enforcement
#                ▼
#   ┌─────────────┐
#   │  Compactor  │  ← merges small blocks, deletes expired data
#   └─────────────┘
#
#   Query path (read side):
#
#   [Grafana / LogQL client]
#         │  HTTP GET /loki/api/v1/query_range
#         ▼
#   ┌─────────────┐
#   │   Querier   │  ← fans out to Ingesters (live data) + blocks (flushed data)
#   └─────────────┘
#
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT 1 — DISTRIBUTOR
# ─────────────────────────────────────────────────────────────────────────────
#
# The Distributor is the front door for all incoming log pushes. Every POST to
# /loki/api/v1/push hits the Distributor first. It never stores anything — its
# entire job is validation, rate-limiting, and routing.
#
# What it does in order:
#
#   1. VALIDATE the push request
#      - Checks that each log entry has a valid timestamp
#      - Enforces reject_old_samples_max_age (72h here): if the log's timestamp
#        is older than 72h, it is rejected with HTTP 400 right here, before any
#        Ingester is involved. This protects the index from backfill poisoning.
#      - Checks ingestion_rate_mb and ingestion_burst_size_mb. If the tenant
#        (the single "fake" tenant here since auth_enabled: false) is pushing
#        faster than 4 MB/s sustained or 6 MB burst, the request is rejected
#        with HTTP 429. The Distributor tracks this with a local token-bucket
#        counter — no network call to Loki needed.
#
#        TOKEN BUCKET — how the rate limiter works:
#        A token bucket is a rate limiting algorithm. Unrelated to ring tokens —
#        same word, different concept entirely.
#
#        Imagine a bucket with a capacity of ingestion_burst_size_mb (6MB here).
#        Tokens (credits) refill into it continuously at ingestion_rate_mb (4MB/s)
#        up to the bucket capacity. Every incoming push costs tokens equal to
#        its payload size.
#
#          t=0.0s  bucket=6MB   push 2MB → bucket=4MB   allowed
#          t=0.1s  bucket=4.4MB push 3MB → bucket=1.4MB allowed
#          t=0.2s  bucket=1.8MB push 2MB → bucket=-0.2  REJECTED 429
#          t=0.5s  bucket=1MB   push 0.5MB → bucket=0.5MB allowed
#
#        A burst up to 6MB is absorbed instantly. Sustained traffic above 4MB/s
#        drains the bucket and triggers rejection. Sustained traffic below 4MB/s
#        lets the bucket refill, accumulating headroom for the next burst.
#
#        The counter lives in the Distributor's own process memory — reading and
#        updating a float in RAM. No network round trip, no coordination with
#        other services. Sub-microsecond decision.
#
#        In a multi-Distributor cluster each Distributor has its own independent
#        bucket, so the effective burst ceiling is burst_size × num_distributors —
#        an acceptable approximation since rate limiting needs fast rejection of
#        abusive traffic, not perfect byte-level accuracy. Here in monolithic
#        mode there is one Distributor so the limit is exact.
#
#      - Validates that label names are legal (no special characters, not too
#        many labels per stream, label values not too long).
#
#   2. HASH the stream to find its owner on the ring
#      Each log push contains one or more streams. A stream is a unique label
#      set, e.g. {app="web", level="error"}. The Distributor computes a 32-bit
#      hash of the sorted label set (using a fast non-cryptographic hash —
#      xxHash or FNV depending on Loki version). This hash is a position on a
#      virtual ring of 2^32 positions.
#
#      The ring is divided into ranges, each owned by an Ingester. The
#      Distributor does a binary search on the ring to find which Ingester owns
#      the range containing this hash. This lookup is O(log n) and done
#      entirely in memory — no network call to the Ingester yet.
#
#   3. REPLICATE to replication_factor Ingesters
#      If replication_factor is 3, the Distributor sends the log entry to the
#      primary Ingester AND the next 2 clockwise neighbours on the ring. This
#      means the data survives if up to 2 Ingesters crash before flushing.
#      Here replication_factor: 1 — the Distributor sends to exactly one
#      Ingester (itself, in monolithic mode). No replication overhead.
#
#   4. WAIT for a quorum of acknowledgements
#      With replication_factor 3 and write_quorum 2, the Distributor waits for
#      2 of the 3 Ingesters to acknowledge before returning HTTP 204 to the
#      client. Here with factor 1 it waits for 1 ack — trivially fast.
#
#   In monolithic mode (this deployment), the Distributor is a goroutine inside
#   the same Loki process. The "network call" to the Ingester is an in-process
#   function call. The ring logic still runs; it just always resolves to the
#   same local Ingester.
#
#   GOROUTINE — what it is:
#   A goroutine is a lightweight thread managed by the Go runtime rather than
#   the OS. You can have hundreds of thousands of them in one process. Unlike
#   an OS thread they are cheap to create (~2KB stack vs ~1MB for an OS thread)
#   and can block freely without stalling other goroutines — the Go runtime
#   parks a blocked goroutine and runs another one on the same OS thread.
#
#   BLOCKING AND PARKING — in detail:
#   When a goroutine blocks (waiting for IO, a channel, a mutex, a syscall)
#   the Go runtime does not block the OS thread it was running on. Instead:
#
#     1. DETECT — the Go runtime detects the block at the point where the
#        goroutine calls something that would wait: a channel receive, a
#        net.Read(), a sync.Mutex.Lock(), a time.Sleep(), etc.
#
#     2. PARK — the runtime saves the goroutine's current state (stack pointer,
#        program counter, registers) into the goroutine struct in heap memory
#        and marks it as "waiting". This is done entirely in userspace —
#        no kernel involvement, no OS context switch, cost is nanoseconds.
#
#     3. SCHEDULE — the runtime's scheduler (called the GMP scheduler) picks
#        another runnable goroutine from its run queue and resumes it on the
#        same OS thread. The OS thread never stops executing — it just switches
#        which goroutine it is running.
#
#     4. UNPARK — when the blocking condition resolves (IO completes, channel
#        has a value, mutex is released) the runtime marks the goroutine as
#        runnable again and puts it back on a run queue. The next time an OS
#        thread is free it picks it up and resumes from exactly where it parked.
#
#   GMP SCHEDULER — the three pieces:
#     G (goroutine) → the unit of work, the lightweight thread
#     M (machine)   → the OS thread, the actual CPU execution context
#     P (processor) → a logical CPU slot, holds a run queue of G's ready to run
#                     and is required to execute any G on any M. GOMAXPROCS
#                     controls how many P's exist — default is one per CPU core.
#
#   The relationship:
#     M must hold a P to run any G.
#     P has a local run queue of G's waiting to execute.
#     When G blocks, M releases P (or another M takes the P) so the P
#     can keep scheduling other G's — the OS thread is never wasted sitting idle.
#
#   SYSCALL exception:
#   Pure Go blocking (channels, mutexes) is handled entirely in userspace.
#   But a blocking OS syscall (e.g. reading from disk with no async path)
#   DOES block the OS thread — the kernel takes over and the M is stuck.
#   In this case the Go runtime detaches the P from the blocked M and hands
#   it to another M (spinning up a new OS thread if needed) so the P's run
#   queue keeps draining. When the syscall returns, the original M tries to
#   reacquire a P — if none are free it parks itself and puts its G back on
#   the global run queue.
#
#   This is why goroutines feel like they block freely — for most blocking
#   operations the OS thread never actually blocks. The illusion of blocking
#   is implemented as cooperative userspace scheduling underneath.
#
#   The runtime multiplexes all goroutines onto a small pool of real OS threads
#   (one per CPU core by default), giving true parallelism across cores:
#
#     OS thread 1:  Distributor goroutine  ← routing decisions
#     OS thread 2:  Ingester goroutine     ← writing head block
#     OS thread 3:  Compactor goroutine    ← merging blocks
#     OS thread 4:  Querier goroutine      ← serving reads
#
#   In monolithic mode all Loki components are goroutines inside one process.
#   Communication between them is a Go function call or channel send — no TCP
#   socket, no serialization, no loopback network. This is why "no network
#   call needed" is accurate even though the components are logically separate.
#
#   OS THREAD — what it is:
#   An OS thread is a unit of CPU instruction execution. At the hardware level
#   a CPU core does one thing at a time: fetch an instruction from memory,
#   decode it, execute it, write the result back. An OS thread is the
#   abstraction the kernel uses to track WHERE in a program the CPU is and
#   WHAT state it carries as it steps through instructions.
#
#   THE FULL STACK — from source code to hardware:
#
#     source code (Python, Go, C, whatever)
#          ↓  compiled or interpreted into
#     machine instructions (binary, CPU-architecture specific)
#          ↓  loaded into
#     RAM (process virtual address space — code segment, stack, heap)
#          ↓  OS scheduler assigns a CPU core to a thread
#     CPU core fetches instructions from RAM and executes them sequentially
#          ↓  instructions read and write values in RAM
#     RAM state changes (variables updated, data structures modified)
#          ↓  hardware controllers watch specific memory addresses (DMA, MMIO)
#     hardware reacts — NIC sends packet, GPU renders frame, disk writes block
#
#   At the bottom of every abstraction stack is the same loop: CPU executes
#   instructions, memory changes, hardware reacts to those changes.
#   Processes, threads, and the OS scheduler exist solely to manage how CPU
#   time is allocated so that memory gets modified correctly and in the right
#   order across multiple concurrent programs.
#
#   WHAT THE OS ACTUALLY DOES:
#     - Virtual address spaces: gives each process the illusion it owns all
#       memory. The MMU (Memory Management Unit, a hardware component on the
#       CPU die) translates virtual addresses to physical RAM addresses on
#       every memory access, enforcing process isolation at hardware level.
#     - Scheduling: decides which thread runs on which CPU core and for how
#       long (preemptive, time-sliced — typically 1-10ms per slice).
#     - Context switching: saves the outgoing thread's registers and program
#       counter, restores the incoming thread's state, resumes — threads are
#       unaware this happened.
#     - Hardware mediation: processes cannot talk to hardware directly. They
#       issue syscalls — controlled entry points into the kernel, which holds
#       the trusted drivers and performs the IO on the process's behalf.
#
#   WHAT A THREAD CARRIES:
#   A thread is the minimum state required for the CPU to resume execution
#   after being switched out:
#
#     program counter  → address of the next instruction to execute
#     stack pointer    → where the current call stack lives in memory
#     registers        → CPU scratchpad (intermediate values, addresses)
#     stack (~1MB)     → local variables, function frames, return addresses
#
#   Everything else — heap, code segment, globals, file descriptors — is
#   shared across all threads in the same process. They live in the same
#   virtual address space, which makes inter-thread communication via shared
#   memory fast but also means a bug in one thread can corrupt data another
#   thread is reading. This is the fundamental tradeoff of the threading model.
#
#   A process is a container — it owns the virtual address space and OS
#   resources. Threads are what actually execute instructions on CPU cores.
#   A process with one thread is sequential. A process with many threads
#   runs concurrently across multiple cores.
#
#   The OS scheduler decides which threads run on which CPU cores and for how
#   long — typically in slices of ~1-10ms before switching to another thread
#   (preemptive multitasking). This switching is called a context switch and
#   has real cost: the kernel must save the thread's registers, stack pointer,
#   and program counter, then restore another thread's state.
#
#   Threads vs processes:
#     process  → isolated memory space, expensive to spawn, expensive to switch
#     thread   → shared memory space within a process, cheaper than a process
#                but still heavy compared to a goroutine
#     goroutine → managed by Go runtime inside one OS thread pool, ~2KB stack,
#                 context switch handled in userspace with no kernel involvement
#
#   This is why Go does not create one OS thread per goroutine — with 100,000
#   goroutines that would mean 100GB of stack memory and the kernel scheduler
#   melting under the context switch load. Instead the Go runtime runs a small
#   fixed pool of OS threads and schedules goroutines onto them itself.
#
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT 2 — THE RING
# ─────────────────────────────────────────────────────────────────────────────
#
# The ring is a consistent-hash ring. It is NOT a physical thing — it is a
# data structure (a sorted array of tokens) shared between components so they
# agree on which Ingester owns which stream.
#
# How it works conceptually:
#
#   Imagine a clock face with 2^32 positions (0 to ~4 billion).
#   Each Ingester claims N random positions on this clock (called "tokens").
#   The ring is just a sorted list of (token, ingester_id) pairs:
#
#     position 12_000_000  → Ingester A
#     position 45_000_000  → Ingester B
#     position 78_000_000  → Ingester A
#     position 110_000_000 → Ingester C
#     ...
#
#   When the Distributor hashes stream {app="web", level="error"} and gets,
#   say, 50_000_000 — it walks clockwise to find the first token ≥ 50_000_000.
#   That is 78_000_000 → Ingester A. Stream is always sent to Ingester A.
#
#   If Ingester A dies and is removed from the ring, its tokens are gone.
#   The next clockwise tokens now belong to B or C, so new writes for those
#   streams automatically reroute — no static config changes needed. This is
#   the "consistent" property: adding/removing a node only remaps the streams
#   whose token neighbourhood changed, not every stream at once.
#
#   The ring state is stored in a kvstore. Options:
#     inmemory — single process only, no coordination. Used here because there
#                is exactly one Ingester and it never needs to broadcast its
#                token list to anyone else.
#     memberlist — gossip protocol, peers discover each other and share ring
#                  state without a central coordinator. Used in most Loki
#                  distributed deployments.
#     consul / etcd — external strongly-consistent stores. Used when you need
#                     guaranteed consistency during network partitions.
#
#   instance_addr: 127.0.0.1 is the address this Ingester advertises in the
#   ring so other components know how to reach it. In a real cluster this
#   would be a pod IP or DNS name so other Ingesters can call each other for
#   replication. Here it is localhost because nothing external needs to reach
#   it — it is the only node and it talks to itself in-process.
#
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT 3 — INGESTER
# ─────────────────────────────────────────────────────────────────────────────
#
# The Ingester is where logs actually land and are stored temporarily before
# being flushed to permanent block storage. It is the most complex component.
#
# Internal structure of an Ingester:
#
#   WAL (Write-Ahead Log)
#   ├── Every log entry is written to the WAL on disk BEFORE being acked.
#   │   If the process crashes, the Ingester replays the WAL on restart to
#   │   recover all data that was not yet flushed to object storage.
#   │   Without the WAL, a crash would silently drop logs that were
#   │   acknowledged to the client but not yet persisted.
#   │   The WAL is a sequential append-only file — very fast to write.
#   └── Once a chunk is flushed to object storage, the corresponding WAL
#       segment is deleted (checkpointed).
#
#   Head Block (in RAM, mutable)
#   ├── This is the live buffer. Every stream gets its own "chunk" in the
#   │   head block. A chunk is just a compressed list of (timestamp, log_line)
#   │   pairs for one stream, built up over time.
#   ├── The Ingester also maintains the in-memory TSDB index:
#   │     series table: label_set → local integer series ID
#   │
#   │         ┌─────────────────────────────────┬───────────┐
#   │         │ label_set                       │ series ID │
#   │         ├─────────────────────────────────┼───────────┤
#   │         │ {app="web",  level="error"}     │     1     │
#   │         │ {app="web",  level="info"}      │     2     │
#   │         │ {app="db",   level="error"}     │     3     │
#   │         └─────────────────────────────────┴───────────┘
#   │
#   │     postings lists: label_value → sorted list of series IDs
#   │
#   │         ┌─────────────────┬────────────────┐
#   │         │ label_value     │ series IDs     │
#   │         ├─────────────────┼────────────────┤
#   │         │ app="web"       │ [1, 2]         │
#   │         │ app="db"        │ [3]            │
#   │         │ level="error"   │ [1, 3]         │
#   │         │ level="info"    │ [2]            │
#   │         └─────────────────┴────────────────┘
#   │
#   │     query: {app="web", level="error"}
#   │
#   │         app="web"      → [1, 2]
#   │         level="error"  → [1, 3]
#   │         intersection   → [1]       ← only series ID 1 matches both
#   │         series table   → {app="web", level="error"}
#   │         fetch chunks   → log lines for that stream
#   │
#   │     the label_set is the key used to locate the chunks on disk.
#   │     once the intersection resolves to a series ID, Loki maps that
#   │     ID back to its full label_set and uses it to find the chunk
#   │     files that contain the actual log lines — the label_set is
#   │     both the search result AND the pointer into storage.
#   │  
#   │   This index is rebuilt from the WAL on restart — it is not persisted
#   │   separately during normal operation.
#   └── When a chunk reaches its size limit (~256KB uncompressed) or its
#       max age (default 1h), it is marked as "sealed" — no more writes.
#       Sealed chunks wait in the Ingester until the flush trigger fires.
#
#   Flush triggers (any of these causes a flush to object storage):
#     - A chunk has been sealed for longer than chunk_idle_period (default 30m)
#     - The WAL has grown past a size threshold
#     - A graceful shutdown is initiated
#     - A manual flush is triggered via the admin API
#
#   What happens during a flush:
#     1. All sealed chunks for all streams are gathered.
#     2. The in-memory TSDB index for those chunks is serialized to disk.
#     3. Chunks are compressed (Snappy or LZ4) and written to object storage.
#     4. The index file is written alongside the chunks — together they form
#        an immutable "block" (a directory with an index file + chunk files).
#     5. The WAL segments covering this data are deleted.
#     6. The Ingester starts a fresh head block for new incoming logs.
#
#   The block on disk looks like:
#
#     Block 00XXXXXXXXXXX/       ← directory named by a ULID (time-sortable ID)
#       index                    ← binary TSDB index: series table + postings lists
#       chunks/
#         000001                 ← chunk file (many chunks packed together)
#         000002
#       meta.json
#           Written by the Ingester at flush time. Contains everything Loki
#           needs to know about this block without opening any of its data files:
#
#           {
#             "ulid": "01ARZ3NDEKTSV4RRFFQ69G5FAV",   ← unique block ID (time-sortable)
#             "minTime": 1716220800000,                 ← oldest log timestamp in this block (unix ms)
#             "maxTime": 1716221400000,                 ← newest log timestamp in this block (unix ms)
#             "stats": {
#               "numSamples": 48301,                   ← total log lines stored
#               "numSeries":  12,                      ← unique label_sets in this block
#               "numChunks":  36                       ← total chunk files
#             }
#           }
#
#           The Querier reads meta.json first before touching anything else.
#           If your query asks for logs between 14:00 and 14:05, and this
#           block's maxTime is 13:55, the Querier skips the entire block
#           without opening a single chunk file. This is time-range pruning —
#           the reason Loki stays fast even with months of data on disk.
#
#       tombstones
#           A tombstone is a deletion marker — it does NOT immediately delete
#           data from the chunk files. Instead it records what should be
#           considered deleted:
#
#           {
#             "series":   {app="web", level="error"},  ← which stream
#             "minTime":  1716220800000,                ← delete from
#             "maxTime":  1716221100000                 ← delete until
#           }
#
#           When the Querier reads chunks that overlap with a tombstone's
#           time range, it filters those log lines out of the results in
#           memory before returning them — the bytes are still on disk,
#           they are just silently skipped.
#
#           The Compactor later does a full rewrite of the block, physically
#           removing the tombstoned log lines from the chunk files and then
#           deleting the tombstone itself. Until that rewrite happens the
#           data is "deleted" from the user's perspective but still present
#           on disk — same pattern as Postgres MVCC where dead tuples stay
#           in the heap until VACUUM physically removes them.
#
#   Series IDs inside a block are local unsigned integers starting from 1.
#   They have no meaning outside their block. Two different blocks can both
#   have a series ID 1 referring to completely different label sets.
#
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT 4 — COMPACTOR
# ─────────────────────────────────────────────────────────────────────────────
#
# The Compactor runs as a background process (a goroutine here, a separate
# pod in large deployments). It has two jobs: compaction and retention.
#
# JOB 1 — COMPACTION (merging small blocks into larger ones)
#
#   Each Ingester flush creates a small block covering maybe 1-2 hours of data
#   for one subset of streams. Over time, object storage fills up with many
#   tiny blocks. Querying across a long time range means opening many blocks,
#   each requiring its own index lookup. This gets slow.
#
#   The Compactor merges blocks that cover overlapping or adjacent time ranges
#   into a single larger block (e.g. merge 24 hourly blocks into one daily
#   block). The merged block has:
#     - A new index with series renumbered from 1 (all local, as always)
#     - Merged and re-sorted chunk files
#     - A new meta.json with the combined time range
#
#   The old small blocks are deleted after the merged block is committed.
#   This is always atomic from the reader's perspective: the Querier sees
#   either the old blocks or the new merged block, never a partial state.
#
#   Compaction also deduplicates chunks that were replicated across Ingesters
#   (relevant when replication_factor > 1 and two Ingesters flushed the same
#   data independently).
#
# JOB 2 — RETENTION (enforcing retention_period and deleting expired data)
#
#   When retention_enabled: true, the Compactor runs a retention pass after
#   each compaction cycle. It:
#
#   1. Reads meta.json for every block.
#      If the block's maxT (newest log timestamp) is older than now minus
#      retention_period (72h here), the entire block is expired.
#      The Compactor marks it for deletion and deletes it. No rewriting needed.
#
#   2. If a block is PARTIALLY expired (its time range straddles the retention
#      boundary — some chunks are old enough to delete, some are not):
#      - The Compactor writes a NEW block containing only the surviving chunks.
#      - Series are renumbered locally from 1 in the new block.
#      - The old block is deleted.
#
#   3. At no point does the Compactor modify a live block's index or postings
#      lists. The rule is: blocks are immutable. Deletion = rewrite survivors
#      into a new block + delete the old block atomically.
#
#   This is why a postings list can never point to a missing series ID:
#   the list and everything it references live and die in the same block file.
#   There is no global series registry that could become stale.
#
#   delete_request_store: filesystem tells the Compactor where to store pending
#   delete requests (from the delete API). Must match object_store in schema_config.
#
#   working_directory: /loki/compactor is scratch space for the Compactor to
#   stage blocks during merge/rewrite before atomically committing them.
#
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENT 5 — QUERIER
# ─────────────────────────────────────────────────────────────────────────────
#
# The Querier handles all read requests. For a given LogQL query with time range
# [T1, T2] it must return all matching logs from both live (unflushed) data in
# Ingesters and historical data in flushed blocks. It does this in parallel:
#
#   1. LIVE DATA — asks all Ingesters (via the ring) for any in-memory chunks
#      that overlap [T1, T2]. Ingesters query their head block index and return
#      matching log lines. This data has NOT been flushed yet.
#
#   2. BLOCK DATA — scans object storage for blocks whose meta.json time range
#      overlaps [T1, T2]. For each matching block:
#        a. Opens the TSDB index binary file.
#        b. Looks up each label matcher against the postings lists.
#        c. Intersects postings lists to get matching series IDs.
#        d. Resolves series IDs to chunk file offsets.
#        e. Reads and decompresses only the matching chunk sections.
#        f. Scans log lines for any filter expressions (| json, | grep, etc.).
#
#   3. MERGE + DEDUPLICATE — the Querier merges results from all Ingesters and
#      all blocks, sorted by timestamp. With replication_factor > 1, the same
#      log line may appear from multiple Ingesters and from a flushed block
#      simultaneously. The Querier deduplicates by (timestamp, log_line) hash.
#
#   4. STREAM to the client — results are streamed back, not buffered entirely
#      in RAM. maxLines: 1000 in the Grafana datasource config caps how many
#      lines Grafana will request in a single query.
#
# ─────────────────────────────────────────────────────────────────────────────
# TSDB INDEX INTERNALS — POSTINGS LISTS IN DETAIL
# ─────────────────────────────────────────────────────────────────────────────
#
# Loki TSDB indexes ONLY labels/streams, not full log contents.
#
# The index is an inverted index. The key insight is the direction flip:
# instead of storing series → labels (which you'd need to scan every series
# to answer "which series have app=web?"), it stores label_value → series IDs.
#
# Example — 4 streams flushed into Block 001:
#
#   Series 1: {app="web", level="error"}   → chunk A (logs: "disk full", ...)
#   Series 2: {app="web", level="info"}    → chunk B (logs: "user login", ...)
#   Series 3: {app="api", level="error"}   → chunk C (logs: "timeout", ...)
#   Series 4: {app="api", level="info"}    → chunk D (logs: "request ok", ...)
#
#   Postings lists (sorted integer arrays, stored in the index file):
#     app="web"     → [1, 2]
#     app="api"     → [3, 4]
#     level="error" → [1, 3]
#     level="info"  → [2, 4]
#
# Query: {app="web", level="error"}
#   lookup app="web"     → [1, 2]
#   lookup level="error" → [1, 3]
#   two-pointer intersect (lists have to be sorted):
#     i=0 j=0 → list1[0]=1, list2[0]=1 → match → emit 1, advance both
#     i=1 j=1 → list1[1]=2, list2[1]=3 → 2 < 3 → advance i
#     i exhausted → done
#   result: [1] → Series 1 → chunk A → decompress → return log lines
#
# The two-pointer merge is O(n) where n is the length of the shorter list.
# Lists are sorted integers — CPU-cache-friendly sequential reads.
# No full scan of all series. No heap allocation per step.
#
# HIGH-CARDINALITY WARNING:
#   High-cardinality labels (user_id, trace_id, request_id, workflow_id) must
#   NOT be index labels. Each unique value gets its own postings list with
#   exactly one entry. If you have 1 million unique user_ids, that is 1 million
#   postings lists each with one integer — enormous index, zero intersection
#   benefit (a single-entry list intersects as slowly as it gets).
#
#   Those values belong in the log line payload, queryable without indexing:
#     {app="temporal-worker"} | json | workflow_id="abc123"
#   Loki decompresses the matching chunks and scans the raw JSON — slower than
#   an index lookup but correct, and it doesn't blow up the index size.
#
# BLOCK IMMUTABILITY AND DELETION — THE FULL STORY:
#   Blocks are immutable once written. Series IDs are local to their block.
#   Deletion never edits a postings list — it rewrites the block without the
#   expired series or deletes the block entirely. The list and the series it
#   references always live and die together in the same block file. There is no
#   moment where a postings list points at a series ID that does not exist.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: portfolio
data:
  loki.yaml: |
    # auth_enabled: false disables multi-tenancy. All logs go into a single
    # "fake" tenant. Required for single-node deployments — if true, every
    # push/query request must include an X-Scope-OrgID header.
    # https://grafana.com/docs/loki/latest/configure/#auth_enabled
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    # The common block is a Loki 3.x convenience that sets shared defaults
    # for path_prefix, storage, replication_factor, and ring — avoiding
    # repetition across the ingester, compactor, and ruler sections.
    # loki rules are alerts you can set from example when too many 500 errors are present in the records.
    # https://grafana.com/docs/loki/latest/configure/#common
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      # replication_factor: 1 is correct for single-node. Values > 1 require
      # multiple ingesters and a distributed ring (Consul or etcd).
      # https://grafana.com/docs/loki/latest/configure/#common
      replication_factor: 1
      ring:
        # instance_addr: 127.0.0.1 advertises this Loki instance as localhost
        # inside the ring. This is correct only for a single-node deployment:
        # there are no other ingesters/distributors that need to reach this node
        # over the network. In a distributed cluster this would be the pod IP,
        # service DNS name, or host IP so other Loki nodes can coordinate writes,
        # replication, ownership, and health through the ring.
        #
        # kvstore: inmemory stores ring state only in this process' RAM.
        # Correct for single-node Loki because there is no distributed cluster
        # state to share or coordinate. Multi-node Loki requires a shared ring
        # backend (memberlist/Consul/etcd) so nodes can agree on:
        #   - which ingesters are alive
        #   - which node owns which hash ranges/streams
        #   - where replicas live
        #   - where distributors should route writes
        #
        # Without a shared distributed kvstore, each node would have an isolated,
        # inconsistent view of the ring and clustering would break.
        # https://grafana.com/docs/loki/latest/configure/#ring
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    # schema_config defines HOW Loki organises log data on disk/object storage:
    #   - which index backend to use (tsdb vs old boltdb-shipper)
    #   - which object store holds chunks/indexes (filesystem, S3, GCS, etc.)
    #   - which schema version defines the on-disk layout
    #   - how index tables/blocks are partitioned over time
    #
    # Loki stores logs in two major pieces:
    #   1. compressed log chunks (actual log lines)
    #   2. indexes mapping labels/streams -> chunk references
    #
    # schema_config tells Loki how to interpret BOTH pieces for a given time range.
    # This matters because storage formats evolve across Loki versions.
    #
    # Multiple schema entries are allowed because old logs may have been written
    # using different backends or layouts. Loki selects the correct schema entry
    # dynamically based on the log timestamp being queried.
    #
    # Example:
    #   logs from 2025 -> boltdb-shipper + schema v11
    #   logs from 2026 -> TSDB + schema v13
    #
    # During queries Loki transparently reads both formats, allowing migrations
    # without reindexing or deleting historical data.
    #
    # Adding a new schema entry is the standard migration path when changing:
    #   - index backend
    #   - object storage backend
    #   - schema version
    #
    # IMPORTANT:
    # Never modify old schema entries retroactively once data exists.
    # Existing chunks/indexes were physically written using that layout.
    # Changing old entries can make historical logs unreadable.
    #
    # The `from:` date acts as a cutover point:
    # logs with timestamps >= from use that schema entry.
    #
    # https://grafana.com/docs/loki/latest/configure/storage/#schema-config
    schema_config:
      configs:
        - from: 2026-01-01
          # store: tsdb is the current index backend as of Loki 3.0.
          # boltdb-shipper was deprecated in 3.0 and removed in a later release.
          # https://grafana.com/docs/loki/latest/operations/storage/tsdb/
          store: tsdb
          object_store: filesystem
          # schema: v13 is required for TSDB. v11/v12 only worked with boltdb-shipper.
          # https://grafana.com/docs/loki/latest/configure/storage/#schema-versions
          schema: v13
          index:
            prefix: index_
            # Timestamps are NOT labels and are never run through the inverted
            # index. Instead, time is the axis chunks are physically bucketed
            # along: period: 24h creates one index table per day on disk.
            #
            # When a query arrives with a time range, Loki does two levels of
            # time filtering:
            #
            #   1. BUCKET SKIP (Chunks are inside Buckets) — any day-table whose entire range falls outside
            #      the query window is skipped before touching the index at all.
            #
            #   2. CHUNK SKIP — inside the matching day-table, every chunk has
            #      a minT and maxT stored in its metadata. Loki compares those
            #      against the query window and skips chunks that don't overlap.
            #      "last 2h" might load 1 chunk; "last 6h" loads 2-3 — chunks
            #      outside the window are never decompressed or scanned.
            #
            # Making timestamps a label would give every log line a unique value
            # and detonate the index — time works precisely because it lives
            # outside the postings-list system entirely.
            period: 24h

    limits_config:
      # reject_old_samples blocks ingestion of logs older than
      # reject_old_samples_max_age. Prevents backfill from bloating the index
      # and keeps query performance predictable.
      # https://grafana.com/docs/loki/latest/configure/#limits_config
      reject_old_samples: true
      reject_old_samples_max_age: 72h
      # ingestion_rate_mb and ingestion_burst_size_mb are per-tenant rate limits
      # on how fast logs can be pushed to Loki. With auth_enabled: false there
      # is effectively one tenant, so this is a global ingest cap.
      # https://grafana.com/docs/loki/latest/operations/request-validation-rate-limits/
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6
      # retention_period in limits_config is the Loki 3.x way to configure
      # how long logs are kept. The compactor enforces this — it will not
      # delete anything unless retention_enabled: true is also set below.
      # https://grafana.com/docs/loki/latest/operations/storage/retention/
      retention_period: 72h

    compactor:
      working_directory: /loki/compactor
      # retention_enabled: true activates the compactor's deletion loop.
      # Without this, retention_period above is ignored and logs accumulate forever.
      # https://grafana.com/docs/loki/latest/operations/storage/retention/#configuring-the-retention-period
      retention_enabled: true
      # delete_request_store must match the object_store in schema_config.
      # https://grafana.com/docs/loki/latest/configure/#compactor
      delete_request_store: filesystem

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      name: http
  selector:
    app: loki

---
# Loki is a StatefulSet — StatefulSets update pods one at a time and guarantee
# that the same pod name always gets the same PVC, so there is no mount conflict
# during rolling updates with a ReadWriteOnce volume.
# https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory owned by root.
        # Loki runs as UID/GID 10001 and will fail to write chunks or index
        # files unless ownership is fixed before the main container starts.
        # https://github.com/grafana/loki/blob/main/production/docker/Dockerfile
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /loki"]
          volumeMounts:
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: loki
          image: grafana/loki:3.5.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          # /ready returns HTTP 200 once Loki has finished loading the index
          # and is ready to accept push and query requests.
          # https://grafana.com/docs/loki/latest/reference/api/#identify-ready-loki-instance
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data

---
# =============================================================================
# ALLOY — collects logs from the temporal-worker pod and ships to Loki
#
# Replaces Promtail (EOL March 2026). Alloy is the official Grafana collector.
# Uses loki.source.kubernetes which reads from the Kubernetes API directly —
# no hostPath volume needed, no dependency on the node filesystem layout.
# https://grafana.com/docs/alloy/latest/reference/components/loki/loki.source.kubernetes/
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: portfolio

---
# =============================================================================
# RBAC — how Alloy gets permission to call the Kubernetes API
#
# Every pod in Kubernetes runs as a ServiceAccount. If you don't specify one,
# it uses the "default" ServiceAccount in its namespace, which has no API
# permissions by default.
#
# Kubernetes automatically mounts a ServiceAccount token into every pod at:
#   /var/run/secrets/kubernetes.io/serviceaccount/token
#
# That token is a short-lived JWT signed by the cluster's API server. When
# Alloy calls the Kubernetes API (to list pods, stream logs, etc.) it sends
# this token in the Authorization header. The API server validates the JWT
# and checks RBAC to decide if the call is allowed.
#
# The three objects below wire this together:
#
#   ServiceAccount (alloy)
#     └─ Identity: gives Alloy a named principal ("alloy" in "portfolio")
#
#   ClusterRole (alloy)
#     └─ Permission set: defines what API calls are allowed and on what resources
#
#   ClusterRoleBinding (alloy)
#     └─ Binding: says "the alloy ServiceAccount has the alloy ClusterRole"
#
# Without the binding, the ServiceAccount and ClusterRole exist but are
# completely disconnected — Alloy would still get 403s on every API call.
#
# ClusterRole (not Role) is used because loki.source.kubernetes needs to
# read pod metadata and log streams cluster-wide, even though the Alloy
# config later filters down to the "portfolio" namespace in application logic.
# RBAC does not know or care about your Alloy config — permissions are
# evaluated at the API server level before your app even sees the response.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: alloy
rules:
  - apiGroups: [""]
    # "" means the core Kubernetes API group — the original built-in resources.
    # Kubernetes APIs are versioned and grouped:
    #   ""              → core group: pods, nodes, services, endpoints (no prefix)
    #   "apps"          → deployments, statefulsets, daemonsets
    #   "batch"         → jobs, cronjobs
    #   "rbac.authorization.k8s.io" → roles, clusterroles
    # Alloy only needs the core group because it only reads pods and nodes.

    resources: [nodes, nodes/proxy, services, endpoints, pods, pods/log]
    # nodes          → discover which machines exist in the cluster
    # nodes/proxy    → proxy requests through a node to reach its kubelet API
    #                  needed to scrape node-level metrics
    # services       → discover service metadata for log enrichment
    # endpoints      → discover which pods are backing which services
    # pods           → discover pod metadata (labels, namespace, container names)
    #                  this is how Alloy builds the label_set for each log stream
    # pods/log       → stream live log output from a specific pod via the API
    #                  this is the actual log bytes, not just metadata

    verbs: [get, watch, list]
    # get   → fetch a single specific resource by name
    #         "give me pod backend-abc123"
    # list  → fetch all resources of this type at once
    #         "give me all pods in the cluster right now"
    # watch → open a long-lived connection, stream changes as they happen
    #         "tell me whenever a pod is created, updated, or deleted"
    #         this is how Alloy reacts to new pods without polling constantly
    #
    # notably absent:
    #   create, update, delete, patch → Alloy is read-only, cannot modify anything

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: alloy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: alloy
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: portfolio

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: portfolio
data:
  config.alloy: |
    // =============================================================================
    // ALLOY PIPELINE OVERVIEW
    //
    // Alloy is a data pipeline. You wire components together by passing the output
    // of one into the input of the next. The flow for this config is:
    //
    //   discovery.kubernetes   →   discovery.relabel   →   loki.source.kubernetes
    //                                                              ↓
    //                                                       loki.process
    //                                                              ↓
    //                                                        loki.write
    //
    // Step 1 — DISCOVER:  ask the k8s API "what pods exist right now?"
    // Step 2 — FILTER:    keep only the pods we care about, rename their metadata
    //                     into labels we actually want to query on in Loki
    // Step 3 — COLLECT:   open a log stream for each surviving target (like kubectl logs --follow)
    // Step 4 — PROCESS:   parse each JSON log line, promote fields into Loki stream labels
    // Step 5 — SHIP:      push batched log entries to Loki's HTTP ingest API
    // =============================================================================


    // =============================================================================
    // STEP 1 — DISCOVER pods via the Kubernetes API
    //
    // discovery.kubernetes continuously watches the k8s API for pods in the given
    // namespaces. It returns a live list of "targets" — one per running container.
    //
    // Each target is a bag of labels. Most are raw k8s metadata prefixed with
    // __meta_kubernetes_*, for example:
    //
    //   __meta_kubernetes_pod_name              = "temporal-worker-7d9f4b-xkzqp"
    //   __meta_kubernetes_namespace             = "portfolio"
    //   __meta_kubernetes_pod_label_app         = "temporal-worker"
    //   __meta_kubernetes_pod_container_name    = "temporal-worker"
    //   __meta_kubernetes_pod_node_name         = "my-node"
    //   __address__                             = "10.42.0.17:8080"
    //   ... (dozens more)
    //
    // These __meta_* labels are internal to the discovery/relabel pipeline.
    // They are NOT automatically forwarded to Loki as stream labels — you have
    // to explicitly promote the ones you want in discovery.relabel below.
    //
    // role = "pod" means one target per container (a pod with 2 containers = 2 targets).
    // Other roles: "node", "service", "endpoints", "ingress" — not needed here.
    // https://grafana.com/docs/alloy/latest/reference/components/discovery/discovery.kubernetes/
    // =============================================================================
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        // Scope discovery to only this namespace. Without this, Alloy would
        // watch every pod in the entire cluster, which is wasteful and noisy.
        names = ["portfolio"]
      }
    }


    // =============================================================================
    // STEP 2 — FILTER and RELABEL targets
    //
    // discovery.relabel takes the full list of targets from discovery.kubernetes
    // and runs each one through a sequence of rules top-to-bottom.
    //
    // Rules have two jobs:
    //   A) FILTER — drop targets you don't want (action: keep / action: drop)
    //   B) RELABEL — reshape the label set you do want (action: replace)
    //
    // The output of this block (discovery.relabel.temporal_worker.output) is a
    // filtered, relabeled list of targets that loki.source.kubernetes will open
    // log streams for. Only targets that survive all "keep" rules make it through.
    //
    // https://grafana.com/docs/alloy/latest/reference/components/discovery/discovery.relabel/
    // =============================================================================
    discovery.relabel "temporal_worker" {
      targets = discovery.kubernetes.pods.targets

      // ── FILTER ──────────────────────────────────────────────────────────────
      // action: keep means: evaluate the regex against source_labels.
      // If it MATCHES → keep the target and continue to the next rule.
      // If it DOES NOT match → drop the target entirely. No further rules run.
      //
      // __meta_kubernetes_pod_label_app contains the value of the pod's
      // "app" label from its Kubernetes metadata (i.e. what you wrote under
      // labels: in the pod spec). Here we keep only pods where app=temporal-worker.
      //
      // Every other pod in the "portfolio" namespace — nginx, grafana, loki, etc.
      // — is silently discarded at this point. They never get a log stream opened.
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "keep"
        regex         = "temporal-worker"
      }

      // ── RELABEL ─────────────────────────────────────────────────────────────
      // action: replace copies the value of source_labels into target_label,
      // renaming it to something short and human-readable.
      //
      // WHY this matters: Loki organizes logs into "streams" identified by a
      // set of key=value labels. Those labels are what you filter on in LogQL:
      //
      //   {app="temporal-worker", level="error"}
      //   {namespace="portfolio", pod=~"temporal-worker-.*"}
      //
      // If you skip this relabeling step, the raw __meta_kubernetes_* labels
      // do NOT automatically become Loki stream labels. Your logs would land
      // in Loki with no queryable metadata attached — just raw log lines with
      // no way to filter by pod, namespace, or container.
      //
      // Each rule below promotes one piece of k8s metadata into a plain label
      // that Loki will index and that LogQL can match against.

      // Becomes: namespace="portfolio"
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        action        = "replace"
        target_label  = "namespace"
      }

      // Becomes: pod="temporal-worker-7d9f4b-xkzqp"
      // Useful for querying logs from a specific pod replica.
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        action        = "replace"
        target_label  = "pod"
      }

      // Becomes: container="temporal-worker"
      // Useful when a pod has multiple containers (init containers, sidecars).
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        action        = "replace"
        target_label  = "container"
      }

      // Becomes: app="temporal-worker"
      // Copied from the pod's own "app" label — the same one we filtered on above.
      // Having it as a plain Loki label lets you query {app="temporal-worker"}
      // without needing to know individual pod names.
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        action        = "replace"
        target_label  = "app"
      }
    }


    // =============================================================================
    // STEP 3 — OPEN log streams for each surviving target 
    77 Alloy receives each line and holds it in memory alongside the label set it built in step 2
    77 Labels behave like an envelop and Logs can be seen as the message.
    //
    // loki.source.kubernetes takes the filtered+relabeled target list and calls
    // the Kubernetes API to stream logs from each one — identical to running:
    //   kubectl logs --follow <pod> -c <container> -n portfolio
    //
    // This happens entirely over the k8s API using the ServiceAccount token
    // mounted into the Alloy pod. No hostPath volume, no access to the node's
    // /var/log/containers directory, no privileged mode required.
    //
    // As new pods matching our filter appear (restarts, rollouts), Alloy
    // automatically picks them up via the live watch from discovery.kubernetes.
    // Deleted pods are automatically dropped.
    //
    // Each log line is forwarded as-is to the next stage for processing.
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.source.kubernetes/
    // =============================================================================
    loki.source.kubernetes "temporal_worker" {
      targets    = discovery.relabel.temporal_worker.output
      forward_to = [loki.process.parse_json.receiver]
    }


    // =============================================================================
    // STEP 4 — PROCESS each log line through a parsing pipeline
    //
    // loki.process runs every incoming log line through a sequence of stages.
    // The temporal-worker emits structured JSON logs, e.g.:
    //
    //   {"level":"info","event":"workflow_started","workflow_id":"abc123","ts":1234567890}
    //
    // We parse that JSON and selectively promote certain fields into Loki stream
    // labels so they can be used in LogQL label matchers.
    //
    // IMPORTANT — cardinality tradeoff:
    //   Loki indexes stream labels. High-cardinality labels (workflow_id, user_id,
    //   request_id — fields with millions of unique values) bloat the index and
    //   destroy query performance. Only promote low-cardinality fields as labels.
    //
    //   Fields NOT promoted here (e.g. workflow_id, ts) are still fully queryable
    //   in LogQL using the JSON parser inline:
    //     {app="temporal-worker"} | json | workflow_id="abc123"
    //   They just aren't indexed — Loki scans the raw chunk content for them.
    //
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.process/
    // =============================================================================
    loki.process "parse_json" {

      // stage.json parses the raw log line as JSON and extracts specific fields
      // into Alloy's internal per-entry state (not yet Loki labels).
      //
      // Format: fieldName = "json_key"
      // The left side is the internal variable name used in later stages.
      // The right side is the key path in the JSON object.
      stage.json {
        expressions = {
          level = "level",
          event = "event",
        }
      }

      // stage.labels promotes the extracted fields from internal state into
      // actual Loki stream labels that get indexed and are usable in LogQL.
      //
      // Empty string value means "use the value extracted by the same name
      // from stage.json above". After this stage, every log line from
      // temporal-worker lands in Loki with labels like:
      //
      //   {app="temporal-worker", namespace="portfolio", level="error", event="task_failed"}
      //
      // You can now query: {app="temporal-worker", level="error"} in Grafana Explore.
      stage.labels {
        values = {
          level = "",
          event = "",
        }
      }

      forward_to = [loki.write.loki.receiver]
    }


    // =============================================================================
    // STEP 5 — SHIP log entries to Loki
    //
    // loki.write receives batched log entries and POSTs them to Loki's push API.
    //
    // Uses the cluster-internal DNS name (loki.portfolio.svc.cluster.local)
    // instead of an IP address. Kubernetes DNS guarantees this resolves to the
    // correct ClusterIP even after pod restarts or service changes — no hardcoded
    // IPs, no ingress, no port-forwarding needed for internal cluster traffic.
    //
    // Format: <service-name>.<namespace>.svc.cluster.local:<port>
    //
    // https://grafana.com/docs/alloy/latest/reference/components/loki/loki.write/
    // =============================================================================
    loki.write "loki" {
      endpoint {
        url = "http://loki.portfolio.svc.cluster.local:3100/loki/api/v1/push"
      }
    }

---
# DaemonSet ensures one Alloy pod runs on every node. On a single-node cluster
# this is equivalent to a single-replica Deployment but is the correct
# primitive for log collectors — if nodes are added, Alloy scales automatically.
# https://grafana.com/docs/alloy/latest/set-up/install/kubernetes/
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: portfolio
  labels:
    app: alloy
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.9.2
          args:
            - run
            - /etc/alloy/config.alloy
            # --storage.path is where Alloy persists WAL (write-ahead log) and
            # component state. /tmp is acceptable here — Alloy will recover from
            # Loki on restart and the WAL is not the source of truth.
            # https://grafana.com/docs/alloy/latest/reference/cli/run/
            - --storage.path=/tmp/alloy
            # this is the address that the cluster can use to comunnicate with  this container
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            # 12345 exposes Alloy's own metrics and UI for debugging.
            # https://grafana.com/docs/alloy/latest/troubleshoot/debug/
            - containerPort: 12345
              name: http-metrics
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: alloy-config

---
# =============================================================================
# GRAFANA — dashboard UI, served publicly at /grafana/ via nginx
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: portfolio
data:
  # Provisioned datasources are loaded at startup and cannot be edited or
  # deleted from the UI — they are managed as code.
  # https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        # access: proxy means Grafana's backend makes the request to Loki,
        # not the browser. Required when Loki is on a private ClusterIP.
        # https://grafana.com/docs/grafana/latest/datasources/loki/
        access: proxy
        url: http://loki.portfolio.svc.cluster.local:3100
        isDefault: true
        jsonData:
          # maxLines caps how many log lines a single query returns in Explore.
          # Does not affect dashboard panels — those are capped by their own query settings.
          # https://grafana.com/docs/grafana/latest/datasources/loki/#configure-the-data-source
          maxLines: 1000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  # grafana-data is a ReadWriteOnce PVC — only one pod can mount it at a time.
  # RollingUpdate would start the new pod before terminating the old one,
  # causing both to compete for the same RWO volume. The new pod gets stuck
  # in ContainerCreating indefinitely.
  # Recreate terminates the old pod first, releases the PVC, then starts the new pod.
  # https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#recreate-deployment
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory owned by root.
        # Grafana runs as UID/GID 472 and cannot write its SQLite database
        # unless ownership is fixed before the main container starts.
        # https://github.com/grafana/grafana/blob/main/Dockerfile
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            # ─── ADMIN CREDENTIALS ───────────────────────────────────────────
            #
            # Grafana stores its users in an internal SQLite database at
            # /var/lib/grafana/grafana.db. On FIRST boot these env vars seed
            # the admin user into that database.
            #
            # On SUBSEQUENT boots Grafana checks if the admin user already
            # exists in grafana.db — if it does, these env vars are ignored
            # entirely. This means changing these values after first boot has
            # no effect. To change the admin password after first boot you
            # must use the Grafana UI or the API directly.
            #
            # Values come from a Kubernetes Secret (monitoring-secrets) so the
            # credentials are never written in plain text in this yaml file.
            # kubectl create secret generic monitoring-secrets \
            #   --from-literal=GF_SECURITY_ADMIN_USER=admin \
            #   --from-literal=GF_SECURITY_ADMIN_PASSWORD=yourpassword
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            # ─── SUBPATH ROUTING ─────────────────────────────────────────────
            #
            # Grafana sits behind nginx at /grafana/ instead of at the root /.
            # Two env vars are required to make this work correctly:
            #
            # GF_SERVER_ROOT_URL
            #     Tells Grafana its full public URL including the subpath.
            #     Grafana uses this to build redirect URLs — for example after
            #     login it redirects to GF_SERVER_ROOT_URL/dashboards.
            #     Without this, post-login redirects go to / which nginx serves
            #     as the frontend, not Grafana — you'd get bounced out of Grafana
            #     every time you log in.
            #
            # GF_SERVER_SERVE_FROM_SUB_PATH
            #     Tells Grafana to prefix ALL asset URLs with /grafana/.
            #     Grafana's UI is a React app that loads JS, CSS, and font files.
            #     Without this flag those requests go to /public/build/app.js
            #     — nginx has no location block for that, returns 404, UI is blank.
            #     With this flag they go to /grafana/public/build/app.js
            #     — nginx proxies /grafana/ to the Grafana container, works.
            - name: GF_SERVER_ROOT_URL
              value: "https://testproveoportfolio.xyz/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

            # ─── ACCESS CONTROL ──────────────────────────────────────────────
            #
            # GF_AUTH_ANONYMOUS_ENABLED = false
            #     By default Grafana allows anyone to view dashboards without
            #     logging in (anonymous viewer role). Disabling this forces
            #     every request to authenticate first. Without this your
            #     metrics and logs are visible to anyone who finds the /grafana/ URL.
            #
            # GF_USERS_ALLOW_SIGN_UP = false
            #     By default Grafana shows a "Sign Up" link on the login page
            #     that lets anyone create their own account. Disabling this
            #     means only the admin can create accounts via the UI or API.
            #     Without this anyone who finds your Grafana URL can register
            #     themselves as a user.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            # Disable self-registration — accounts are created by the admin only.
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-security/configure-authentication/grafana/#allow-sign-up
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

            # ─── TELEMETRY ────────────────────────────────────────────────────
            #
            # GF_ANALYTICS_REPORTING_ENABLED = false
            #     Grafana phones home to stats.grafana.org by default, sending
            #     usage statistics (number of dashboards, users, datasources,
            #     plugin names). Disabled here for privacy — your infrastructure
            #     topology is nobody else's business.
            #
            # GF_ANALYTICS_CHECK_FOR_UPDATES = false
            #     Grafana polls api.grafana.com on startup and periodically to
            #     check if a newer version exists, then shows a banner in the UI.
            #     Disabled here — updates are managed through the image tag in
            #     this yaml file, not through Grafana's own notification system.
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          # /api/health returns HTTP 200 when Grafana is fully initialised
          # and its database migrations have completed.
          # https://grafana.com/docs/grafana/latest/developers/http_api/other/#returns-health-information-about-grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources

---
# =============================================================================
# GRAFANA USER INIT — one-shot Kubernetes Job
# =============================================================================
#
# PURPOSE
# -----------------------------------------------------------------------------
# Creates and maintains a low-privilege "demo" user in Grafana for portfolio
# visitors. The user is safe to expose publicly because it only receives the
# Viewer role.
#
#
# WHO CREATES WHAT
# -----------------------------------------------------------------------------
#
# admin user
#   Automatically created by Grafana itself on first startup from:
#
#     GF_SECURITY_ADMIN_USER
#     GF_SECURITY_ADMIN_PASSWORD
#
#   defined in the Grafana Deployment.
#
#   This Job does NOT create the admin user.
#
#
# demo user
#   Created and maintained by THIS Job through Grafana's HTTP API.
#
#   Intended usage:
#     - public dashboards
#     - recruiter access
#     - portfolio/demo environments
#
#   Permissions:
#     Viewer role only
#       - can view dashboards
#       - cannot edit dashboards
#       - cannot create datasources
#       - cannot manage Grafana
#
#
# WHY THIS EXISTS
# -----------------------------------------------------------------------------
# Grafana does not provide a declarative Kubernetes-native way to create
# additional users at startup.
#
# Therefore this Job:
#
#   1. waits until Grafana is healthy
#   2. calls the Grafana HTTP API
#   3. creates or updates the demo user
#
#
# IDEMPOTENCY
# -----------------------------------------------------------------------------
# This Job is intentionally idempotent:
#
#   safe to run once
#   safe to run 100 times
#
# Flow:
#
#   if demo user exists:
#       update password only
#
#   else:
#       create user
#       assign Viewer role
#
# Without this lookup-first pattern the Job would fail after the first deploy
# because the user would already exist.
#
#
# WHY THE JOB RE-RUNS
# -----------------------------------------------------------------------------
# Kubernetes Jobs are immutable after completion.
#
# kubectl apply cannot patch a completed Job template.
#
# Therefore:
#
#   rolling-deploy.sh deletes the old Job before apply
#
# AND:
#
#   ttlSecondsAfterFinished automatically cleans completed Jobs after 5 minutes
#
#
# MANUAL RE-RUN
# -----------------------------------------------------------------------------
# Re-run ONLY this Job:
#
#   kubectl delete job grafana-init-users -n portfolio
#
#   kubectl apply -f k8s/17-monitoring.yaml
#
#
# BASH CONCEPTS USED BELOW
# -----------------------------------------------------------------------------
#
# set -e
#   Exit the entire script immediately if any command returns non-zero.
#
#   Prevents continuing in a broken state after a failed curl/API request.
#
#
# /dev/null
#   Special Linux device that discards everything written to it.
#
#   Used to silence command output we do not care about.
#
#
# > /dev/null 2>&1
#   Redirect BOTH stdout and stderr into /dev/null.
#
#   File descriptors:
#     0 = stdin
#     1 = stdout
#     2 = stderr
#
#   2>&1 means:
#     "send stderr wherever stdout is currently going"
#
#
# $()
#   Bash command substitution.
#
#   Runs a command and captures its stdout into a variable.
#
# Example:
#
#   STATUS=$(curl ...)
#
#
# curl -w "%{http_code}"
#   curl format variable expansion.
#
#   %{http_code} is NOT a bash variable.
#   It is expanded internally by curl after the HTTP request finishes.
#
# Example:
#
#   curl -w "%{http_code}"
#
#   prints:
#
#     200
#     404
#     503
#
#
# until
#   Inverse of while.
#
#   Loops UNTIL the command succeeds (exit code 0).
#
# Example:
#
#   until curl succeeds:
#       sleep
#
#
# QUOTING VARIABLES
# -----------------------------------------------------------------------------
# Always quote bash variables:
#
#   "$VAR"
#
# instead of:
#
#   $VAR
#
# Prevents:
#   - word splitting
#   - glob expansion
#   - syntax errors on empty variables
#
#
# CURL FLAGS USED BELOW
# -----------------------------------------------------------------------------
#
# -s
#   Silent mode.
#
#   Suppresses progress meter and most output.
#
#
# -f
#   Fail on HTTP errors.
#
#   Makes curl return non-zero on:
#
#     4xx
#     5xx
#
#   Without -f:
#
#     HTTP 404 still returns exit code 0
#
#   With -f:
#
#     HTTP 404 returns non-zero
#
#
# -u "user:pass"
#   HTTP Basic Authentication.
#
#   curl automatically generates:
#
#     Authorization: Basic <base64>
#
#
# -H "Header: value"
#   Adds custom HTTP headers.
#
# Example:
#
#   -H "Content-Type: application/json"
#
# tells Grafana:
#
#   "the request body contains JSON"
#
#
# -X METHOD
#   Explicit HTTP method.
#
# Examples:
#
#   -X POST   → create
#   -X PUT    → replace/update
#   -X PATCH  → partial update
#
#
# -d "..."
#   HTTP request body ("data").
#
# Used here to send JSON payloads.
#
#
# =============================================================================
apiVersion: batch/v1
kind: Job

metadata:
  name: grafana-init-users
  namespace: portfolio

spec:
  # Automatically delete the completed Job and pod after 5 minutes.
  #
  # Keeps the namespace clean and avoids accumulating completed Job pods.
  #
  # Without this:
  #   completed Jobs remain forever unless manually deleted.
  ttlSecondsAfterFinished: 300

  # Maximum number of pod retries before the Job is marked failed.
  #
  # Each retry creates a NEW pod.
  #
  # Useful because Grafana may still be booting when the Job starts.
  backoffLimit: 5

  template:
    spec:

      # Restart failed containers inside the SAME pod.
      #
      # Valid Job policies:
      #
      #   Never
      #   OnFailure
      #
      # "Always" is invalid for Jobs.
      restartPolicy: OnFailure

      containers:
      - name: init

        # Small Alpine Linux image (~5MB).
        #
        # curl is installed at runtime using apk.
        image: alpine:3.19

        command: ["/bin/sh", "-c"]

        args:
        - |
          # Exit entire script on first failure.
          set -e

          # Install curl silently.
          #
          # apk:
          #   Alpine Linux package manager.
          #
          # --no-cache:
          #   do not persist package index to disk.
          #
          # > /dev/null 2>&1:
          #   silence all output.
          apk add --no-cache curl > /dev/null 2>&1

          # Base URL of Grafana service inside the Kubernetes cluster.
          #
          # .svc.cluster.local:
          #   Kubernetes internal DNS domain.
          GRAFANA="http://grafana.portfolio.svc.cluster.local:3000"

          echo "Waiting for Grafana..."

          # Wait until Grafana responds successfully.
          #
          # until:
          #   keep looping UNTIL command succeeds.
          #
          # curl flags:
          #   -s  → silent
          #   -f  → fail on HTTP errors
          #   -u  → HTTP Basic Auth
          #
          # Without -f:
          #   curl returns success even on HTTP 404/503.
          #
          # sleep 3:
          #   avoid hammering Grafana continuously.
          until curl -sf \
            -u "admin:${ADMIN_PASS}" \
            "$GRAFANA/api/health" > /dev/null 2>&1; do

            sleep 3
          done

          echo "Grafana is up"

          # Check whether the demo user already exists.
          #
          # curl -w "%{http_code}":
          #   print ONLY the HTTP status code after the request.
          #
          # -o /dev/null:
          #   discard response body.
          #
          # $():
          #   capture stdout into bash variable.
          #
          # Possible values:
          #   200 → user exists
          #   404 → user missing
          HTTP_STATUS=$(curl -s \
            -o /dev/null \
            -w "%{http_code}" \
            -u "admin:${ADMIN_PASS}" \
            "$GRAFANA/api/users/lookup?loginOrEmail=demo")

          # Bash test expression.
          #
          # Always quote variables inside [ ].
          if [ "$HTTP_STATUS" = "200" ]; then

            # User exists.
            #
            # Fetch full JSON response and extract numeric ID.
            #
            # Example Grafana response:
            #
            #   {"id":3,"email":"demo@local",...}
            #
            # grep -o '"id":[0-9]*'
            #   extracts:
            #
            #     "id":3
            #
            # cut -d: -f2
            #   splits by ":" and returns field #2:
            #
            #     3
            USER_ID=$(curl -sf \
              -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' \
              | cut -d: -f2)

            # Update password.
            #
            # -H "Content-Type: application/json"
            #   tells Grafana the request body is JSON.
            #
            # -X PUT
            #   replace/update operation.
            #
            # -d
            #   request body.
            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X PUT \
              -d "{\"password\":\"${DEMO_PASS}\"}" \
              "$GRAFANA/api/admin/users/${USER_ID}/password" \
              > /dev/null

            echo "Demo user password synced (user ID: $USER_ID)"

          else

            # User does not exist.
            #
            # Create user first.
            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "{\"name\":\"Demo\",\"email\":\"demo@local\",\"login\":\"demo\",\"password\":\"${DEMO_PASS}\",\"OrgId\":1}" \
              "$GRAFANA/api/admin/users" \
              > /dev/null

            # Lookup again to obtain generated numeric ID.
            USER_ID=$(curl -sf \
              -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' \
              | cut -d: -f2)

            # Downgrade role to Viewer.
            #
            # PATCH:
            #   partial update — modify only the role field.
            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X PATCH \
              -d "{\"role\":\"Viewer\"}" \
              "$GRAFANA/api/orgs/1/users/${USER_ID}" \
              > /dev/null

            echo "Demo user created as Viewer (user ID: $USER_ID)"
          fi
        env:
          - name: ADMIN_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_SECURITY_ADMIN_PASSWORD
          - name: DEMO_PASS
            valueFrom:
              secretKeyRef:
                name: monitoring-secrets
                key: GF_DEMO_PASSWORD
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"