# =============================================================================
# 17-monitoring.yaml — Grafana + Loki + Promtail + user init Job
#
# Namespace: portfolio (same as the app — single environment, no separation needed)
#
# Secret: monitoring-secrets is created by deploy-k3s-local.sh from the
# password files before this manifest is applied. Do not define it here.
#
# Grafana is publicly accessible via nginx at /grafana/
# No port-forwarding needed.
#
# ACCESS:
#   https://testproveoportfolio.xyz/grafana/
#   Admin:  admin / <contents of .grafana-admin-password>
#   Demo:   demo  / <contents of .grafana-demo-password>  (Viewer only)
#
# MEMORY: ~320Mi actual across all three pods
# =============================================================================

---
# =============================================================================
# LOKI — stores and indexes the logs
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: portfolio
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 1m
      chunk_retain_period: 30s
      max_transfer_retries: 0

    schema_config:
      configs:
        - from: 2026-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/boltdb-shipper-compactor
      shared_store: filesystem

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 72h
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 6

    chunk_store_config:
      max_look_back_period: 72h

    table_manager:
      retention_deletes_enabled: true
      retention_period: 72h

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      name: http
  selector:
    app: loki

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: portfolio
  labels:
    app: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory as root.
        # chown to UID/GID 10001 (loki user) before the main process starts
        # so Loki can write chunks and index files.
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 10001:10001 /loki"]
          volumeMounts:
            - name: loki-data
              mountPath: /loki
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: loki
          image: grafana/loki:2.9.0
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: loki-data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data

---
# =============================================================================
# PROMTAIL — reads logs from the temporal-worker pod only
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: portfolio

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, watch, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: portfolio

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: portfolio
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.portfolio.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: temporal-worker
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - portfolio

        pipeline_stages:
          - json:
              expressions:
                event: event
                level: level
                workflow_id: workflow_id
                event_type: event_type
                lang: lang
                task_queue: task_queue
                error: error
          - labels:
              level:
              event:

        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: temporal-worker
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - replacement: /var/log/pods/*$1*/*/*.log
            separator: _
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: portfolio
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

---
# =============================================================================
# GRAFANA — dashboard UI, served publicly at /grafana/ via nginx
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: portfolio
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.portfolio.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: portfolio
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: portfolio
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        # local-path provisioner creates the PVC directory as root.
        # chown to UID/GID 472 (grafana user) before the main process starts
        # so Grafana can write its database and config files.
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitoring-secrets
                  key: GF_SECURITY_ADMIN_PASSWORD
            # ── Subpath serving: required for nginx /grafana/ proxy ──
            # Without these two, Grafana builds asset URLs relative to /
            # (e.g. /public/build/app.js) and the browser gets 404s for
            # every JS and CSS file — the UI loads blank.
            # GF_SERVER_ROOT_URL tells Grafana what its full public URL is
            # so post-login redirects point to the right place.
            # GF_SERVER_SERVE_FROM_SUB_PATH prefixes all asset paths with
            # /grafana/ so they resolve correctly through nginx.
            - name: GF_SERVER_ROOT_URL
              value: "https://testproveoportfolio.xyz/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-datasources

---
# =============================================================================
# GRAFANA USER INIT — one-shot Job, runs after Grafana is healthy
#
# Admin is created automatically by Grafana from GF_SECURITY_ADMIN_* above.
# This Job creates the demo Viewer user from GF_DEMO_PASSWORD in the secret.
# Idempotent: if demo user already exists, updates the password to match.
#
# Re-run manually:
#   kubectl delete job grafana-init-users -n portfolio
#   kubectl apply -f k8s/17-monitoring.yaml
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-init
  namespace: portfolio

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-init
  namespace: portfolio
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["monitoring-secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-init
  namespace: portfolio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-init
subjects:
- kind: ServiceAccount
  name: grafana-init
  namespace: portfolio

---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-init-users
  namespace: portfolio
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: grafana-init
      restartPolicy: OnFailure
      containers:
      - name: init
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          apk add --no-cache curl > /dev/null 2>&1

          GRAFANA="http://grafana.portfolio.svc.cluster.local:3000"
          K8S="https://kubernetes.default.svc"
          TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
          SECRET_URL="$K8S/api/v1/namespaces/portfolio/secrets/monitoring-secrets"

          SECRET_JSON=$(curl -sf --cacert "$CACERT" \
            -H "Authorization: Bearer $TOKEN" "$SECRET_URL")

          ADMIN_PASS=$(echo "$SECRET_JSON" \
            | grep -o '"GF_SECURITY_ADMIN_PASSWORD":"[^"]*"' \
            | cut -d'"' -f4 | base64 -d)

          DEMO_PASS=$(echo "$SECRET_JSON" \
            | grep -o '"GF_DEMO_PASSWORD":"[^"]*"' \
            | cut -d'"' -f4 | base64 -d)

          echo "Waiting for Grafana..."
          until curl -sf -u "admin:${ADMIN_PASS}" "$GRAFANA/api/health" > /dev/null 2>&1; do
            sleep 3
          done
          echo "Grafana is up"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "admin:${ADMIN_PASS}" \
            "$GRAFANA/api/users/lookup?loginOrEmail=demo")

          if [ "$HTTP_STATUS" = "200" ]; then
            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)

            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X PUT \
              -d "{\"password\":\"${DEMO_PASS}\"}" \
              "$GRAFANA/api/admin/users/${USER_ID}/password" > /dev/null

            echo "Demo user already exists - password updated (user ID: $USER_ID)"
          else
            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X POST \
              -d "{\"name\":\"Demo\",\"email\":\"demo@local\",\"login\":\"demo\",\"password\":\"${DEMO_PASS}\",\"OrgId\":1}" \
              "$GRAFANA/api/admin/users" > /dev/null

            USER_ID=$(curl -sf -u "admin:${ADMIN_PASS}" \
              "$GRAFANA/api/users/lookup?loginOrEmail=demo" \
              | grep -o '"id":[0-9]*' | cut -d: -f2)

            curl -sf \
              -u "admin:${ADMIN_PASS}" \
              -H "Content-Type: application/json" \
              -X PATCH \
              -d "{\"role\":\"Viewer\"}" \
              "$GRAFANA/api/orgs/1/users/${USER_ID}" > /dev/null

            echo "Demo user created as Viewer (user ID: $USER_ID)"
          fi

          echo "Grafana user init complete"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"