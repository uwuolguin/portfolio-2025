---
# =============================================================================
# 16-libretranslate.yaml — Self-hosted translation service
#
# Runs fully offline after model download. REST API at /translate.
#   POST /translate {"q": "hola", "source": "es", "target": "en", "format": "text"}
#   → {"translatedText": "hello"}
#
# LT_LOAD_ONLY=en,es — only en+es models (~200MB). All languages = ~4GB.
# Backend reaches this at http://libretranslate:5000.
#
# PROBE STRATEGY
# startupProbe runs exclusively on boot (24 × 10s = 240s max) and blocks
# liveness/readiness until /health passes. Handles slow first-boot model
# download without inflating initialDelaySeconds on every subsequent restart.
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: libretranslate
  namespace: portfolio
  labels:
    app: libretranslate
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: libretranslate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: libretranslate
  namespace: portfolio
  labels:
    app: libretranslate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: libretranslate
  # ── Recreate, not RollingUpdate ────────────────────────────────────────────
  # libretranslate-models-data is a ReadWriteOnce PVC.
  # The previous config had RollingUpdate with maxSurge:1 maxUnavailable:0 —
  # the worst possible combination for a RWO PVC. It guarantees deadlock:
  # Kubernetes creates the new pod (surge +1), both old and new pods try to
  # mount the same RWO PVC, new pod gets stuck in ContainerCreating forever,
  # and maxUnavailable:0 prevents Kubernetes from killing the old pod to
  # break the deadlock. The deploy hangs until the readiness probe timeout.
  # Recreate solves this: old pod is killed first, PVC is released, new pod
  # mounts it cleanly. Brief downtime on translation during deploy only.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: libretranslate
    spec:
      initContainers:
        # Runs as root before the main container starts.
        # local-path provisioner creates the PVC directory as root — this
        # chowns it to UID/GID 1032 (libretranslate user) so the process
        # can write model files and index.json on first boot.
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1032:1032 /data"]
          volumeMounts:
            - name: libretranslate-models
              mountPath: /data
          resources:
            requests:
              memory: "16Mi"
              cpu: "25m"
            limits:
              memory: "32Mi"
              cpu: "50m"

      containers:
        - name: libretranslate
          image: libretranslate/libretranslate:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          env:
            # Only load English and Spanish models.
            # Saves ~3.8GB of download and ~1GB of runtime memory
            # compared to loading all supported languages.
            - name: LT_LOAD_ONLY
              value: "en,es"
            # Disable the web UI — this pod is API-only, internal traffic only.
            - name: LT_DISABLE_WEB_UI
              value: "true"
            # No API key required — internal cluster traffic only, not exposed
            # through nginx. Set LT_API_KEYS=true if you expose this externally.
            - name: LT_API_KEYS
              value: "false"
            - name: LT_HOST
              value: "0.0.0.0"
            - name: LT_PORT
              value: "5000"
            # 1 worker — sufficient for internal demo traffic.
            # Default is 4 workers which adds ~50Mi of unnecessary overhead.
            - name: LT_THREADS
              value: "1"

          # Runs exclusively until it passes — blocks liveness and readiness.
          # Every 10 seconds /health has 5 seconds to respond, 24 times before restart.
          # On subsequent boots with a warm PVC, passes in ~10s.
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 24
            periodSeconds: 10
            timeoutSeconds: 5

          # Detects crashes and hangs after startup is complete.
          # Short delay is safe — startupProbe already confirmed the service is up.
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          # Gates Service traffic. Pod stays out of the endpoint slice
          # until /health returns 200.
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              memory: "196Mi"
              cpu: "50m"
            limits:
              # en+es models fit in ~300Mi at runtime.
              # 384Mi gives headroom with a single worker.
              memory: "384Mi"
              cpu: "500m"

          volumeMounts:
            # Mounted one level up from packages so index.json and all
            # other argos-translate files are also on the PVC and owned
            # by the libretranslate user.
            - name: libretranslate-models
              mountPath: /home/libretranslate/.local/share/argos-translate

      volumes:
        - name: libretranslate-models
          persistentVolumeClaim:
            claimName: libretranslate-models-data