---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: portfolio
  labels:
    app: postgres-replica
    role: replica
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres-replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: portfolio
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
        role: replica
    spec:
      initContainers:
        - name: ssl-certgen
          image: alpine:3.20
          command: ["sh","-c"]
          args:
            - |
              apk add --no-cache openssl
              mkdir -p /certs
              openssl req -new -x509 -nodes -days 3650 \
                -subj "/C=CL/ST=NA/L=NA/O=portfolio/CN=postgres-replica" \
                -out /certs/server.crt \
                -keyout /certs/server.key
              chmod 600 /certs/server.key
              chmod 644 /certs/server.crt
              chown 999:999 /certs/server.*
          volumeMounts:
            - name: postgres-certs
              mountPath: /certs

        - name: replica-init
          image: postgres:16
          imagePullPolicy: IfNotPresent 
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          command: ["sh","-c"]
          args:
            - |
              set -e

              export PGPASSWORD="$POSTGRES_PASSWORD"
              echo "postgres-primary:5432:*:$POSTGRES_USER:$POSTGRES_PASSWORD" > /tmp/.pgpass
              chmod 600 /tmp/.pgpass
              export PGPASSFILE=/tmp/.pgpass

              if [ -f "$PGDATA/PG_VERSION" ]; then
                [ -f "$PGDATA/standby.signal" ] && exit 0
                rm -rf "$PGDATA"/*
              fi

              until pg_isready -h postgres-primary -U "$POSTGRES_USER"; do
                sleep 5
              done

              psql -h postgres-primary -U "$POSTGRES_USER" -d postgres -c \
                "SELECT pg_create_physical_replication_slot('replica_slot_1')
                 WHERE NOT EXISTS (
                   SELECT 1 FROM pg_replication_slots WHERE slot_name='replica_slot_1'
                 );" || true

              pg_basebackup \
                -h postgres-primary \
                -U "$POSTGRES_USER" \
                -D "$PGDATA" \
                -Fp -Xs -R -P \
                --checkpoint=fast \
                --wal-method=stream

                            cat > "$PGDATA/pg_hba.conf" <<EOF
              local   all   all                         scram-sha-256
              host    all   all   127.0.0.1/32          scram-sha-256
              host    all   all   ::1/128               scram-sha-256
              hostssl all   all   0.0.0.0/0             scram-sha-256
              hostssl all   all   ::/0                  scram-sha-256
              hostssl replication all 0.0.0.0/0         scram-sha-256
              hostssl replication all ::/0              scram-sha-256
              EOF

                            chown postgres:postgres "$PGDATA/pg_hba.conf"
                            chmod 600 "$PGDATA/pg_hba.conf"

                            cat >> "$PGDATA/postgresql.auto.conf" <<EOF
              hot_standby = on
              primary_conninfo = 'host=postgres-primary port=5432 user=$POSTGRES_USER password=$POSTGRES_PASSWORD sslmode=require application_name=replica1'
              primary_slot_name = 'replica_slot_1'
              recovery_target_timeline = 'latest'
              EOF

              touch "$PGDATA/standby.signal"
              chmod 700 "$PGDATA"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent 
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - postgres
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/var/lib/postgresql/certs/server.crt
            - -c
            - ssl_key_file=/var/lib/postgresql/certs/server.key
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-certs
              mountPath: /var/lib/postgresql/certs
              readOnly: true

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-replica-data
        - name: postgres-certs
          emptyDir: {}


# ─── replica-init: what this script does and why ────────────────────────────
#
# This initContainer runs before the replica postgres starts.
# It has one job: make PGDATA a valid streaming replica of the primary.
#
# AUTH SETUP
# Sets both PGPASSWORD and .pgpass file so no postgres tool ever prompts
# for a password interactively — an interactive prompt would hang the
# initContainer forever since there is no human here to type anything.
#
#   export PGPASSWORD="$POSTGRES_PASSWORD"
#   echo "postgres-primary:5432:*:$POSTGRES_USER:$POSTGRES_PASSWORD" > /tmp/.pgpass
#   chmod 600 /tmp/.pgpass
#   export PGPASSFILE=/tmp/.pgpass
#
# REBOOT GUARD
# Checks if PGDATA was already initialized in a previous run:
#   - PG_VERSION missing         → first run, proceed to clone
#   - standby.signal present     → healthy replica, exit 0, nothing to do
#   - PG_VERSION but no signal   → previous run failed midway, wipe and redo
#
#   if [ -f "$PGDATA/PG_VERSION" ]; then
#     [ -f "$PGDATA/standby.signal" ] && exit 0
#     rm -rf "$PGDATA"/*
#   fi
#
# WAIT FOR PRIMARY
# Polls postgres-primary (K8s Service DNS) until it accepts connections.
# The Service only routes traffic once the primary's readiness probe passes,
# so this loop guarantees primary is genuinely ready before cloning starts.
#
#   until pg_isready -h postgres-primary -U "$POSTGRES_USER"; do
#     sleep 5
#   done
#
# REPLICATION SLOT
# Creates slot replica_slot_1 on the primary if it doesn't exist.
# The slot is the primary's promise to hold WAL until this replica consumes it.
# Without it, a replica restart could find its needed WAL already discarded,
# forcing a full re-clone. Idempotent — safe to run on every deploy.
# || true prevents set -e from killing the script if slot already exists.
#
#   psql -h postgres-primary -U "$POSTGRES_USER" -d postgres -c \
#     "SELECT pg_create_physical_replication_slot('replica_slot_1')
#      WHERE NOT EXISTS (
#        SELECT 1 FROM pg_replication_slots WHERE slot_name='replica_slot_1'
#      );" || true
#
# BASE BACKUP
# pg_basebackup copies the entire primary database into PGDATA.
# -Fp plain format, -Xs stream WAL during copy, -R writes auto.conf and
# standby.signal automatically, -P shows progress, --checkpoint=fast
# forces immediate checkpoint on primary so backup starts from clean state.
# WAL streamed in parallel so no changes are missed during the copy.
#
#   pg_basebackup \
#     -h postgres-primary \
#     -U "$POSTGRES_USER" \
#     -D "$PGDATA" \
#     -Fp -Xs -R -P \
#     --checkpoint=fast \
#     --wal-method=stream
#
# PG_HBA OVERWRITE
# pg_basebackup copied the primary's pg_hba.conf — overwrite it with
# replica-specific rules. cat > overwrites, not appends.
# SSL required for all external connections, scram-sha-256 everywhere.
# chown 999 (postgres user UID) — postgres refuses to start if config
# files are not owned by its own user. chmod 600 — no group/world access.
#
#   cat > "$PGDATA/pg_hba.conf" <<EOF
#   local   all   all                         scram-sha-256
#   host    all   all   127.0.0.1/32          scram-sha-256
#   host    all   all   ::1/128               scram-sha-256
#   hostssl all   all   0.0.0.0/0             scram-sha-256
#   hostssl all   all   ::/0                  scram-sha-256
#   hostssl replication all 0.0.0.0/0         scram-sha-256
#   hostssl replication all ::/0              scram-sha-256
#   EOF
#   chown postgres:postgres "$PGDATA/pg_hba.conf"
#   chmod 600 "$PGDATA/pg_hba.conf"
#
# POSTGRESQL.AUTO.CONF
# cat >> appends to what -R already wrote. Sets replica-specific settings:
#   primary_conninfo  → how to connect to primary to stream WAL
#                       uses postgres-primary K8s Service DNS, SSL required
#   primary_slot_name → which slot to use (holds WAL for us on primary)
#   hot_standby       → allows replica to serve reads while in recovery mode
#                       this is the setting that makes the replica useful
#                       for read traffic during normal operation, not just failover
#   recovery_target_timeline → follow latest timeline for failover scenarios
#
#   cat >> "$PGDATA/postgresql.auto.conf" <<EOF
#   hot_standby = on
#   primary_conninfo = 'host=postgres-primary port=5432 user=... sslmode=require application_name=replica1'
#   primary_slot_name = 'replica_slot_1'
#   recovery_target_timeline = 'latest'
#   EOF
#
# STANDBY SIGNAL + PERMISSIONS
# standby.signal tells postgres "you are a replica, enter recovery mode."
# Without this file postgres boots as a standalone primary, sees a full
# database, and starts accepting writes — silently breaking replication.
# chmod 700 on PGDATA — directories need execute bit to be traversable.
# 600 would prevent even postgres from entering its own data directory.
#
#   touch "$PGDATA/standby.signal"
#   chmod 700 "$PGDATA"
#
# ────────────────────────────────────────────────────────────────────────────
