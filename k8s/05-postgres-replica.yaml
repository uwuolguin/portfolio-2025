---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: portfolio
  labels:
    app: postgres-replica
    role: replica
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres-replica
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica
  namespace: portfolio
spec:
  serviceName: postgres-replica
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
        role: replica
    spec:
      initContainers:
        - name: ssl-certgen
          image: alpine:3.20
          command: ["sh","-c"]
          args:
            - |
              apk add --no-cache openssl
              mkdir -p /certs
              openssl req -new -x509 -nodes -days 3650 \
                -subj "/C=CL/ST=NA/L=NA/O=portfolio/CN=postgres-replica" \
                -out /certs/server.crt \
                -keyout /certs/server.key
              chmod 600 /certs/server.key
              chmod 644 /certs/server.crt
              chown 999:999 /certs/server.*
          volumeMounts:
            - name: postgres-certs
              mountPath: /certs

        - name: replica-init
          image: portfolio-postgres:16
          imagePullPolicy: Never
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          command: ["sh","-c"]
          args:
            - |
              set -e

              export PGPASSWORD="$POSTGRES_PASSWORD"
              echo "postgres-primary:5432:*:$POSTGRES_USER:$POSTGRES_PASSWORD" > /tmp/.pgpass
              chmod 600 /tmp/.pgpass
              export PGPASSFILE=/tmp/.pgpass

              if [ -f "$PGDATA/PG_VERSION" ]; then
                [ -f "$PGDATA/standby.signal" ] && exit 0
                rm -rf "$PGDATA"/*
              fi

              until pg_isready -h postgres-primary -U "$POSTGRES_USER"; do
                sleep 5
              done

              psql -h postgres-primary -U "$POSTGRES_USER" -d postgres -c \
                "SELECT pg_create_physical_replication_slot('replica_slot_1')
                 WHERE NOT EXISTS (
                   SELECT 1 FROM pg_replication_slots WHERE slot_name='replica_slot_1'
                 );" || true

              pg_basebackup \
                -h postgres-primary \
                -U "$POSTGRES_USER" \
                -D "$PGDATA" \
                -Fp -Xs -R -P \
                --checkpoint=fast \
                --wal-method=stream

                            cat > "$PGDATA/pg_hba.conf" <<EOF
              local   all   all                         scram-sha-256
              host    all   all   127.0.0.1/32          scram-sha-256
              host    all   all   ::1/128               scram-sha-256
              hostssl all   all   0.0.0.0/0             scram-sha-256
              hostssl all   all   ::/0                  scram-sha-256
              hostssl replication all 0.0.0.0/0         scram-sha-256
              hostssl replication all ::/0              scram-sha-256
              EOF

                            chown postgres:postgres "$PGDATA/pg_hba.conf"
                            chmod 600 "$PGDATA/pg_hba.conf"

                            cat >> "$PGDATA/postgresql.auto.conf" <<EOF
              hot_standby = on
              primary_conninfo = 'host=postgres-primary port=5432 user=$POSTGRES_USER password=$POSTGRES_PASSWORD sslmode=require application_name=replica1'
              primary_slot_name = 'replica_slot_1'
              recovery_target_timeline = 'latest'
              EOF

              touch "$PGDATA/standby.signal"
              chmod 700 "$PGDATA"

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

      containers:
        - name: postgres
          image: portfolio-postgres:16
          imagePullPolicy: Never
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - postgres
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/var/lib/postgresql/certs/server.crt
            - -c
            - ssl_key_file=/var/lib/postgresql/certs/server.key
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-certs
              mountPath: /var/lib/postgresql/certs
              readOnly: true

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-replica-data
        - name: postgres-certs
          emptyDir: {}
