# Only container exposed to the internet, that is why it is the only container with type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: portfolio
data:
  nginx.conf: |
    events {
        worker_connections 512;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 15;
        keepalive_requests 100;
        reset_timedout_connection on;
        server_tokens off;

        client_body_buffer_size 1M;
        client_max_body_size 10M;
        client_header_buffer_size 1k;
        large_client_header_buffers 4 8k;
        client_body_timeout 10s;
        client_header_timeout 10s;
        send_timeout 10s;

        gzip on;
        gzip_vary on;
        gzip_comp_level 6;
        gzip_min_length 1000;
        gzip_types
            text/plain
            text/css
            application/json
            application/javascript
            text/xml
            application/xml
            application/xml+rss
            text/javascript
            image/svg+xml;
        gzip_disable "msie6";

        limit_req_zone $binary_remote_addr zone=static_limit:10m rate=10r/s;
        limit_conn_zone $binary_remote_addr zone=addr_conn:10m;

        upstream backend {
            server backend:8000;
            keepalive 16;
        }

        upstream image_service {
            server image-service:8080;
            keepalive 16;
        }

        # ── HTTP: only used to pass ACME challenges and redirect everything else ──
        server {
            listen 80;
            server_name _;

            location /.well-known/acme-challenge/ {
                root /var/www/certbot;
            }

            location / {
                return 301 https://$host$request_uri;
            }
        }

        # ── HTTPS: TLS terminates here, all real traffic is handled here ──
        server {
            listen 443 ssl http2;
            server_name _;

            ssl_certificate     /etc/nginx/certs/tls.crt;
            ssl_certificate_key /etc/nginx/certs/tls.key;
            ssl_protocols       TLSv1.2 TLSv1.3;
            ssl_ciphers         HIGH:!aNULL:!MD5;
            ssl_session_cache   shared:SSL:10m;
            ssl_session_timeout 10m;

            limit_conn addr_conn 20;

            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            location ~ /\. {
                deny all;
                return 404;
            }

            location / {
                limit_req zone=static_limit burst=20 nodelay;
                root /usr/share/nginx/html;
                try_files $uri $uri/ =403;
            }

            location /files/logos/ {
                limit_req zone=static_limit burst=20 nodelay;
                alias /usr/share/nginx/html/files/logos/;
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location /files/test_pictures/ {
                alias /usr/share/nginx/html/files/test_pictures/;
                expires 1d;
                add_header Cache-Control "public";
            }

            location /images/ {
                proxy_pass http://image_service;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 5s;
                proxy_send_timeout 10s;
                proxy_read_timeout 30s;
            }

            location /docs {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /openapi.json {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
            }

            location ~ ^/api/v1/users/(login|signup|resend-verification) {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                client_max_body_size 1M;
            }

            location /api/ {
                proxy_pass http://backend;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                client_max_body_size 10M;
                client_body_timeout 10s;
            }

            location = /health {
                access_log off;
                add_header Content-Type text/plain;
                return 200 "healthy\n";
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: portfolio
  labels:
    app: nginx
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
    - port: 443
      targetPort: 443
      protocol: TCP
      name: https
  selector:
    app: nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: portfolio-nginx:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tls-certs
              mountPath: /etc/nginx/certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        # tls-certs: certbot writes certs to /etc/letsencrypt/live/ (root-only).
        # We copy them to /home/deploy/certs/, then load into k8s with:
        #   kubectl create secret tls tls-secret \
        #     --cert=/home/deploy/certs/fullchain.pem \
        #     --key=/home/deploy/certs/privkey.pem \
        #     -n portfolio
        # Kubernetes then injects the secret as files into the container at
        # /etc/nginx/certs/ — that is the only way to get files into a running
        # container without baking them into the image.
        - name: tls-certs
          secret:
            secretName: tls-secret