---
# =============================================================================
# RESOURCE 1 OF 2: Service
# =============================================================================
# Creates a stable DNS name "postgres-primary" inside the cluster.
# Any Pod that needs the database connects to postgres-primary:5432.
# ClusterIP = internal only, never exposed to the internet.
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: portfolio
  labels:
    app: postgres-primary
    role: primary
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres-primary

---
# =============================================================================
# RESOURCE 2 OF 2: StatefulSet
# =============================================================================
# StatefulSet (not Deployment) because databases need:
#   1. Stable Pod name: always "postgres-primary-0" (replica knows this name)
#   2. Stable storage: same PVC reattaches after restart
#   3. Ordered startup: primary must start before replica
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │                        VOLUME ARCHITECTURE                         │
# │                                                                    │
# │  Volume Name        Type        What It Stores    Survives Restart │
# │  ─────────────────  ──────────  ────────────────  ──────────────── │
# │  postgres-data      PVC         Database files    YES (on disk)    │
# │  postgres-certs     emptyDir    SSL cert + key    NO (regen'd)     │
# │                                                                    │
# │  Flow:                                                             │
# │  ┌──────────────┐         ┌───────────────┐                       │
# │  │ initContainer│  WRITES │               │                       │
# │  │ ssl-certgen  │───────▶│ postgres-certs │                       │
# │  └──────────────┘  certs  │  (emptyDir)   │                       │
# │                           │               │                       │
# │  ┌──────────────┐  READS  │               │                       │
# │  │  main        │◀───────│               │                       │
# │  │  postgres    │         └───────────────┘                       │
# │  └──────────────┘                                                  │
# └─────────────────────────────────────────────────────────────────────┘
#
# Init scripts (SSL config, pg_hba.conf, db creation, pgpass) are baked
# into the portfolio-postgres:16 Docker image at /docker-entrypoint-initdb.d/.
# They run automatically on first boot (empty PGDATA) — no ConfigMap needed.
#
apiVersion: apps/v1
#see statefulset as a controller, a K8s process that watches your desired state and makes reality match it.
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: portfolio
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres-primary
  template:
    metadata:
      labels:
        app: postgres-primary
        role: primary
    spec:
      # =====================================================================
      # INIT CONTAINER: ssl-certgen
      # =====================================================================
      # Generates a self-signed SSL certificate before PostgreSQL starts.
      # The Docker image's init-ssl.sh expects certs at /var/lib/postgresql/certs/
      # and configures PostgreSQL to use them (via symlink to custom pg_hba.conf).
      initContainers:
        - name: ssl-certgen
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache openssl
              mkdir -p /certs
              if [ ! -f /certs/server.crt ]; then
                echo "Generating PostgreSQL SSL certificates"
                openssl req -new -x509 -nodes -days 3650 \
                  -subj "/C=CL/ST=NA/L=NA/O=portfolio/CN=postgres-primary" \
                  -out /certs/server.crt \
                  -keyout /certs/server.key
                chmod 600 /certs/server.key
                chmod 644 /certs/server.crt
                chown 999:999 /certs/server.key /certs/server.crt
              fi
          volumeMounts:
            - name: postgres-certs
              mountPath: /certs
      # =====================================================================
      # MAIN CONTAINER: postgres
      # =====================================================================
      containers:
        - name: postgres
          image: portfolio-postgres:16
          imagePullPolicy: Never
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: POSTGRES_DB
            # Extra /pgdata subdirectory avoids "lost+found" conflict on PVC mount
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "postgres"
            # ── SSL ────────────────────────────────────────────────────
            # These are set here AND in init-ssl.sh. The args take precedence
            # on every startup; init-ssl.sh writes them to postgresql.ssl.conf
            # which also works. Belt and suspenders — both paths produce SSL.
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/var/lib/postgresql/certs/server.crt"
            - "-c"
            - "ssl_key_file=/var/lib/postgresql/certs/server.key"
            - "-c"
            - "ssl_min_protocol_version=TLSv1.2"
            # ── pg_cron ────────────────────────────────────────────────
            - "-c"
            - "shared_preload_libraries=pg_cron"
            - "-c"
            - "cron.database_name=portfolio"
            - "-c"
            - "cron.use_background_workers=on"
            - "-c"
            - "max_worker_processes=6"
            # ── Authentication ─────────────────────────────────────────
            - "-c"
            - "password_encryption=scram-sha-256"
            # ── Replication ────────────────────────────────────────────
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=3"
            - "-c"
            - "max_replication_slots=3"
            - "-c"
            - "wal_keep_size=256MB"
            - "-c"
            - "hot_standby=on"
            # ── Memory (REDUCED for 2GB droplet) ───────────────────────
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "effective_cache_size=256MB"
            - "-c"
            - "maintenance_work_mem=32MB"
            - "-c"
            - "work_mem=2MB"
            # ── Logging ────────────────────────────────────────────────
            - "-c"
            - "log_statement=ddl"
            - "-c"
            - "log_min_duration_statement=1000"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-certs
              mountPath: /var/lib/postgresql/certs
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-primary-data
        - name: postgres-certs
          emptyDir: {}