# =============================================================================
# 04-postgres-primary.yaml
# PostgreSQL 16 Primary — StatefulSet + ClusterIP Service
#
# Custom image: portfolio-postgres:16 (postgres/Dockerfile)
# Extends official postgres:16 with pg_cron and three init scripts.
# Built locally and imported into k3s — no registry, imagePullPolicy: Never.
#
# =============================================================================
# RESOURCES IN THIS FILE
# =============================================================================
#
# 1. Service (ClusterIP)
#    Stable internal DNS name: postgres-primary:5432
#    ClusterIP = internal only, never exposed to the internet.
#    Every pod that needs the database connects to this name.
#    The replica (05-postgres-replica.yaml) also uses this name for
#    pg_basebackup and WAL streaming.
#
# 2. StatefulSet
#    StatefulSet (not Deployment) because databases need:
#      - Stable pod name: always "postgres-primary-0". The replica init
#        container in 05-postgres-replica.yaml hardcodes this DNS name
#        to connect via pg_basebackup on first boot.
#      - Stable storage: the same PVC reattaches after pod restart.
#        A Deployment would not guarantee this.
#      - Ordered startup: Kubernetes ensures the primary is running before
#        the replica StatefulSet is scheduled.
#
# =============================================================================
# VOLUME ARCHITECTURE
# =============================================================================
#
#   Volume Name       Type        Backed By                         Survives Restart
#   ──────────────    ──────────  ──────────────────────────────    ────────────────
#   postgres-data     PVC (RWO)   /var/lib/rancher/k3s/storage/     YES (node disk)
#   postgres-certs    emptyDir    node tmpfs                         NO (regenerated)
#
#   postgres-data
#     Bound to the PVC declared in 03-pvcs.yaml (postgres-primary-data).
#     k3s local-path provisioner creates a directory on the node disk under
#     /var/lib/rancher/k3s/storage/ — nothing external, nothing networked.
#     PGDATA lives at /var/lib/postgresql/data/pgdata (one level deeper than
#     the PVC root to avoid the lost+found directory that local-path creates
#     at mount time, which would break initdb on first boot).
#     Data survives pod restarts. Lost if the node is destroyed.
#
#   ReadWriteOnce (RWO): only one pod per node can mount this PVC at a time.
#   StatefulSets handle this correctly by design — the same pod always gets
#   the same PVC reattached. No mount conflict possible, unlike Deployments
#   with RollingUpdate strategy which would try to start a new pod before
#   killing the old one and deadlock on the RWO mount.
#
#   postgres-certs
#     emptyDir shared between the ssl-certgen init container (writes) and
#     the main postgres container (reads, read-only mount).
#     Empty on every pod start. Certs are regenerated by ssl-certgen before
#     PostgreSQL ever touches them. Ephemeral by design — all traffic is
#     internal to the cluster (10.42.x.x), a fresh self-signed cert on every
#     restart is simpler and equally secure for this use case.
#
# =============================================================================
# BOOT LIFECYCLE
# =============================================================================
#
# 1. KUBERNETES SCHEDULES THE POD
#    StatefulSet schedules postgres-primary-0. Both volumes are mounted before
#    any container runs. Neither is created here — they are declared:
#      /var/lib/postgresql/data  <- postgres-data PVC (already exists from 03-pvcs.yaml,
#                                   local-path directory on node disk already allocated)
#      /var/lib/postgresql/certs <- postgres-certs emptyDir (provisioned by Kubernetes
#                                   when the pod is scheduled, always starts empty)
#
# 2. INIT CONTAINER: ssl-certgen (alpine:3.20)
#    Runs before the main container. Uses openssl to generate a self-signed
#    certificate and writes server.crt + server.key into postgres-certs.
#    chowns both files to UID 999 (the postgres OS user inside postgres:16)
#    so the main container can read the key file.
#    emptyDir is provisioned fresh by Kubernetes on every pod schedule so
#    a cert from a previous run can never survive into the next one.
#    https://kubernetes.io/docs/concepts/storage/volumes/ (search: emptyDir)
#
# 3. MAIN CONTAINER STARTS
#    Mounts postgres-certs read-only. PGDATA is set to
#    /var/lib/postgresql/data/pgdata -- the extra subdirectory sidesteps the
#    lost+found conflict at the PVC root (local-path provisioner creates it).
#
# 4. POSTGRES ENTRYPOINT CHECKS PGDATA
#    The official postgres:16 entrypoint checks whether PGDATA contains a
#    PG_VERSION file. That file is written by initdb on first boot and never
#    removed -- it is the single source of truth for whether the cluster has
#    already been initialized.
#    hub.docker.com/_/postgres (section: "How to extend this image")
#    github.com/docker-library/postgres/blob/master/docker-entrypoint.sh
#
#    Non-empty PGDATA (PG_VERSION exists -- pod restart, data already on disk):
#      initdb is skipped. All init scripts in /docker-entrypoint-initdb.d/ are
#      skipped entirely. PostgreSQL starts directly with the args below.
#      This is the normal path on every restart after the first boot.
#
#    Empty PGDATA (no PG_VERSION -- first boot, fresh PVC):
#      initdb runs to initialize the cluster, then all init scripts execute
#      in alphabetical order (01-init-ssl.sh, 02-init-db.sh, 03-init-pgpass.sh).
#      After this completes, PG_VERSION exists and subsequent restarts take
#      the non-empty path above.
#
# 5. INIT SCRIPTS (first boot only) — baked into postgres/Dockerfile
#
#    01-init-ssl.sh
#      Reads certs from /var/lib/postgresql/certs/ (written by ssl-certgen).
#      Writes postgresql.ssl.conf into PGDATA with ssl=on directives and
#      appends an include line to postgresql.conf.
#      Replaces pg_hba.conf with a symlink to pg_hba.ssl.conf which defines
#      the full auth policy: local scram-sha-256, both host and hostssl for
#      TCP (Temporal needs plain TCP, backend enforces sslmode=require at the
#      app layer), hostssl-only for replication.
#
#    02-init-db.sh
#      Creates temporal and temporal_visibility databases owned by postgres.
#      Idempotent: wrapped in SELECT ... WHERE NOT EXISTS.
#      Temporal's auto-setup image (14-temporal.yaml) runs schema migrations
#      against these databases on its own first boot.
#
#    03-init-pgpass.sh
#      Writes /var/lib/postgresql/.pgpass with postgres credentials so
#      pg_isready, psql, and pg_basebackup (used by the replica init container
#      in 05-postgres-replica.yaml) can connect without an interactive password
#      prompt. chmod 600 and chown postgres:postgres are required — PostgreSQL
#      silently ignores .pgpass if permissions are too open.
#
# 6. POSTGRESQL STARTS
#    Starts with the args defined below: ssl, pg_cron, scram-sha-256 auth,
#    WAL replication, memory tuned for the 4GB droplet, DDL logging.
#    Liveness and readiness probes run pg_isready every few seconds.
#    Once the readiness probe passes, the replica init container in
#    05-postgres-replica.yaml connects via pg_basebackup to clone the primary.
#
# =============================================================================
# POSTGRES ARGS SUMMARY
# =============================================================================
#
#   ssl                         on — uses certs from postgres-certs emptyDir
#   ssl_min_protocol_version    TLSv1.2
#   shared_preload_libraries    pg_cron — must be set before start, no hot reload
#   cron.database_name          portfolio — pins pg_cron to this database
#   cron.use_background_workers on
#   max_worker_processes        6 — headroom for pg_cron background workers
#   password_encryption         scram-sha-256 — modern hash, replaces weak md5
#   wal_level                   replica — enables WAL streaming to the replica
#   max_wal_senders             3 — replica + 2 slots for pg_basebackup headroom
#   max_replication_slots       3
#   wal_keep_size               256MB — belt-and-suspenders alongside replica_slot_1
#                               (defined in 05-postgres-replica.yaml). the slot is
#                               doing the real work: it tells the primary to hold WAL
#                               until the replica confirms it consumed it. wal_keep_size
#                               is a dumb fallback that keeps 256MB of WAL on disk
#                               regardless of slot state — covers the window between
#                               slot creation and the replica first connecting.
#   shared_buffers              128MB — PostgreSQL internal cache, conservative
#                               for 4GB node shared with all other services
#   effective_cache_size        256MB — query planner hint, allocates nothing
#   maintenance_work_mem        32MB — used by VACUUM, CREATE INDEX, pg_basebackup
#   work_mem                    2MB — per-sort/hash, kept low to avoid OOM
#   log_statement               ddl — logs CREATE, ALTER, DROP
#   log_min_duration_statement  1000ms — logs any query over 1 second
#
# =============================================================================

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: portfolio
  labels:
    app: postgres-primary
    role: primary
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres-primary

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-primary
  namespace: portfolio
spec:
  serviceName: postgres-primary
  replicas: 1
  selector:
    matchLabels:
      app: postgres-primary
  template:
    metadata:
      labels:
        app: postgres-primary
        role: primary
    spec:
      initContainers:
        - name: ssl-certgen
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache openssl
              mkdir -p /certs
              echo "Generating PostgreSQL SSL certificates"
              openssl req -new -x509 -nodes -days 3650 \
                -subj "/C=CL/ST=NA/L=NA/O=portfolio/CN=postgres-primary" \
                -out /certs/server.crt \
                -keyout /certs/server.key
              chmod 600 /certs/server.key
              chmod 644 /certs/server.crt
              chown 999:999 /certs/server.key /certs/server.crt
          volumeMounts:
            - name: postgres-certs
              mountPath: /certs
      containers:
        - name: postgres
          image: portfolio-postgres:16
          imagePullPolicy: Never
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args:
            - "postgres"
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/var/lib/postgresql/certs/server.crt"
            - "-c"
            - "ssl_key_file=/var/lib/postgresql/certs/server.key"
            - "-c"
            - "ssl_min_protocol_version=TLSv1.2"
            - "-c"
            - "shared_preload_libraries=pg_cron"
            - "-c"
            - "cron.database_name=portfolio"
            - "-c"
            - "cron.use_background_workers=on"
            - "-c"
            - "max_worker_processes=6"
            - "-c"
            - "password_encryption=scram-sha-256"
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=3"
            - "-c"
            - "max_replication_slots=3"
            - "-c"
            - "wal_keep_size=256MB"
            - "-c"
            - "shared_buffers=128MB"
            - "-c"
            - "effective_cache_size=256MB"
            - "-c"
            - "maintenance_work_mem=32MB"
            - "-c"
            - "work_mem=2MB"
            - "-c"
            - "log_statement=ddl"
            - "-c"
            - "log_min_duration_statement=1000"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data  # node disk: /var/lib/rancher/k3s/storage/pvc-<uid>_portfolio_postgres-primary-data/
            - name: postgres-certs
              mountPath: /var/lib/postgresql/certs  # node tmpfs: emptyDir, not a PVC, no path under k3s/storage/
              readOnly: true
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-primary-data
        - name: postgres-certs
          emptyDir: {}