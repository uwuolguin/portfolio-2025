---
# local-path is k3s's built-in storage provisioner.
# It creates directories on the node's local disk (under /var/lib/rancher/k3s/storage/).
# Simple and NOT replicated — if the node dies, the data is lost.
# For production, consider Longhorn, Rook-Ceph, or DigitalOcean Block Storage,
# or schedule periodic backups (e.g., via cronjobs) to external storage
# such as S3, GCS, or NFS. This is usually done once a day or every few hours,
# depending on how critical the data is. Even with local replication, this strategy
# provides an additional disaster recovery safety net if the node completely fails.
# Important: data lives on one specific node. If you scale to multiple nodes,
# a Pod can only schedule on the node where its PVC resides.
# For a single-node droplet, this is acceptable.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-primary-data
  namespace: portfolio
  labels:
    app: postgres-primary
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
apiVersion: v1
