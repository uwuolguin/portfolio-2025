---
# Single-node local storage, fast and simple, but if the droplet dies the data goes with it. Fine for one node, breaks if you scale to multiple since pods can only schedule where their PVC lives. For production: add periodic pg_dump backups to S3 or use Longhorn/DigitalOcean Block Storage.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-primary-data
  namespace: portfolio
  labels:
    app: postgres-primary
spec:
  accessModes:
      #one pod per node can mount at a time this PVC
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # k3s creates a directory on the node's local disk for this PVC
  # lives under /var/lib/rancher/k3s/storage/ — nothing external, no network storage
  storageClassName: local-path
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-replica-data
  namespace: portfolio
  labels:
    app: postgres-replica
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
---
