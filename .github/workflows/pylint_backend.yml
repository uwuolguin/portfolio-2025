name: Lint

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'prod-')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pylint
          pip install -r backend/requirements.txt

      - name: Run pylint
        run: |
          pylint backend/app --fail-under=7