name: Deploy to Production

# Triggers on every push to main, but the job itself only runs
# when the commit message starts with "prod-".
# This avoids burning GitHub Actions minutes on WIP commits.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'prod-')

    steps:
      - name: Deploy to DigitalOcean droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Build + import can take 10-20 min (image-service has TensorFlow wheels).
          # --no-cache means no layer reuse — worst case is always the ceiling.
          command_timeout: 40m
          script: |
            set -e

            echo "=========================================="
            echo "Rolling Deploy — $(date -Iseconds)"
            echo "Commit: ${{ github.event.head_commit.message }}"
            echo "=========================================="

            cd ~/portfolio-2025
            git pull origin main

            # ── Ensure scripts are executable ────────────────────────────────
            # git tracks the executable bit (100755) so this is normally a no-op.
            # It's here as a safety net when switching droplets or cloning fresh —
            # one prod- commit is enough to get everything working without manual chmod.
            chmod +x "k8s scripts"/*.sh

            # ── Step 1: Remove stale custom images from k3s ──────────────────
            # Official images (postgres:16, redis:7, minio, redpanda, temporal,
            # libretranslate, grafana, loki, alloy, busybox, alpine) are left alone.
            # They are cached in k3s containerd and only get re-pulled if their
            # tag changes in a manifest — kubectl apply handles that.
            echo ""
            echo "── Removing stale custom images from k3s ──"
            for img in \
              portfolio-backend \
              portfolio-image-service \
              portfolio-nginx \
              portfolio-postgres; do
              sudo k3s ctr images ls -q \
                | grep "^${img}" \
                | xargs -r sudo k3s ctr images rm \
                && echo "  removed: ${img}" \
                || echo "  not found (skip): ${img}"
            done

            # ── Step 2: Rebuild with zero cache and import ───────────────────
            # NO_CACHE=true is passed to build-and-import-k3s.sh which passes
            # --no-cache to every docker build call.
            # This guarantees no stale layer sneaks through — at the cost of
            # longer build times (~10-20 min for image-service / TensorFlow).
            echo ""
            echo "── Building images (no cache) and importing ──"
            cd "k8s scripts"
            NO_CACHE=true ./build-and-import-k3s.sh

            # ── Step 3: Rolling deploy ────────────────────────────────────────
            echo ""
            echo "── Running rolling deploy ──"
            ./rolling-deploy.sh

            echo ""
            echo "=========================================="
            echo "Deploy complete"
            echo "=========================================="