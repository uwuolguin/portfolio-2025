name: Deploy to Production

# Triggers on every push to main, but the job itself only runs
# when the commit message starts with "prod- ".
# This avoids burning GitHub Actions minutes on WIP commits.
on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: startsWith(github.event.head_commit.message, 'prod-')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: deploy
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}
          command_timeout: 60m
          # Allocates a pseudo-terminal (PTY) for the SSH session.
          # GitHub Actions SSHes in as a non-interactive shell — no TTY, no terminal.
          # Some sudo configurations and scripts check for a terminal before executing,
          # and will fail with "a terminal is required to read the password" without one.
          # request_pty: true forces SSH to allocate a pseudo-terminal, making the session
          # behave like a real interactive shell as far as sudo and other tools are concerned.
          request_pty: true
          script: |
            set -e

            # ── 1. Nuke any local changes and force-pull main ──────────────
            cd /home/deploy/portfolio-2025

            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            # ── 2. Enter the scripts directory ────────────────────────────
            cd "k8s scripts"

            # ── 3. Make all shell scripts executable ──────────────────────
            chmod +x *.sh

            # ── 4. Build Docker images and import them into k3s ───────────
            NO_CACHE=true ./build-and-import-k3s.sh

            # ── 5. Apply manifests and roll out the stack ─────────────────
            ./deploy-k3s-local.sh

            # ── 6. Wait for backend rollout to finish ─────────────────────
            kubectl rollout status deployment/backend -n portfolio --timeout=300s

            # ── 7. Seed test data ─────────────────────────────────────────
            # On subsequent deploys the DB already has the test users/communes/products,
            # so seed_test_data raises ValueError / UniqueViolationError for every row —
            # all expected, all handled by the script's except-and-continue logic.
            #
            # The pipe chain cleans up the output:
            #   2>&1          → merges stderr into stdout so grep can see both
            #   grep -v "..."  → drops lines matching any | -separated pattern:
            #                     already registered / already exists → duplicate user/commune/product noise
            #                     UniqueViolationError               → postgres unique constraint noise
            #                     transaction_                       → transaction_started / transaction_rolled_back
            #                     Traceback                          → python traceback header
            #                     ╭ │ ╰ ❱                           → rich box-drawing chars framing the traceback body
            #   grep .         → drops leftover blank lines filtering leaves behind
            kubectl exec -n portfolio deployment/backend -- \
              python -m scripts.database.seed_test_data 2>&1 \
              | grep -v "already registered\|already exists\|UniqueViolationError\|transaction_\|Traceback\|╭\|│\|╰\|❱" \
              | grep .

            # ── 8. Run test suite ─────────────────────────────────────────
            kubectl exec -n portfolio deployment/backend -- \
              pytest app/tests/ -v