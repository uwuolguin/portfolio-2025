name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # Only run deployments when the commit message starts with "prod-".
    # Regular pushes to main will not trigger the deployment job.
    if: startsWith(github.event.head_commit.message, 'prod-')

    runs-on: ubuntu-latest

    # Hard limit for the entire deployment job.
    # Prevents a stuck deployment from running forever.
    timeout-minutes: 180

    steps:
      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@master

        with:
          # Public IP or hostname of the production droplet.
          host: ${{ secrets.DROPLET_HOST }}

          # Linux user used for deployments.
          username: deploy

          # SSH private key stored in GitHub Secrets.
          key: ${{ secrets.DROPLET_SSH_PRIVATE_KEY }}

          # Maximum time allowed to establish the SSH connection.
          timeout: 60s

          # Maximum runtime for the remote script itself.
          command_timeout: 180m

          # Disable PTY allocation.
          # CI/CD is non-interactive and PTYs are a common source
          # of hanging Docker builds and deployment scripts.
          request_pty: false

          # Stop immediately when any command fails.
          # Prevents continuing a deployment after an earlier error.
          script_stop: true

          script: |
            # -e  : exit immediately on command failure
            # -E  : preserve ERR traps in functions/subshells
            # -u  : fail on undefined variables
            # -o pipefail : fail pipelines if any command fails
            set -Eeuo pipefail

            # Disable interactive package manager prompts.
            export DEBIAN_FRONTEND=noninteractive

            # Move to project root.
            cd /home/deploy/portfolio-2025

            echo "=== $(date) FETCH ==="

            # Download latest Git metadata from origin.
            git fetch origin main

            echo "=== $(date) RESET ==="

            # Force local checkout to exactly match origin/main.
            # Removes any drift caused by manual server changes.
            git reset --hard origin/main



            # Enter deployment scripts directory.
            cd "k8s scripts"

            # Ensure all deployment scripts are executable.
            chmod +x *.sh

            echo "=== $(date) BUILD START ==="

            # Rebuild every Docker image from scratch.
            NO_CACHE=true ./build-and-import-k3s.sh

            echo "=== $(date) BUILD END ==="

            echo "=== $(date) DEPLOY START ==="

            # Apply Kubernetes manifests and perform deployment.
            ./deploy-k3s-local.sh

            echo "=== $(date) DEPLOY END ==="

            # Wait until the backend deployment is fully rolled out.
            # Fails if Kubernetes cannot make the deployment healthy.
            kubectl rollout status deployment/backend \
              -n portfolio \
              --timeout=300s

            # Seed demo/test data after deployment.
            #
            # 2>&1 merges stderr into stdout so both streams pass through
            # the same filtering pipeline.
            #
            # The seed script is idempotent. Re-running it can produce
            # expected duplicate-entry messages for records that already
            # exist in the database.
            #
            # grep -v removes known non-fatal messages to keep the CI log
            # readable while still showing real errors and tracebacks.
            #
            # The final grep removes empty lines left behind by filtering.
            kubectl exec -n portfolio deployment/backend -- \
              python -m scripts.database.seed_test_data 2>&1 \
              | grep -v "already registered\|already exists\|UniqueViolationError\|transaction_\|╭\|│\|╰\|❱" \
              | grep .

            # Execute backend test suite inside the running container.
            # Final verification that the deployed application is healthy.
            kubectl exec -n portfolio deployment/backend -- \
              pytest app/tests/ -v