name: Lint Frontend

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'prod-')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install --save-dev eslint @eslint/js globals

      - name: Run ESLint
        run: npx eslint "nginx/frontend/**/*.js"