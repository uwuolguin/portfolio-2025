- name: Create ESLint config
        run: |
          cat > eslint.config.mjs << 'ESLINTEOF'
          import js from "@eslint/js";
          export default [
            {
              ignores: ["**/libs/**"],
            },
            js.configs.recommended,
            {
              languageOptions: {
                ecmaVersion: 2022,
                sourceType: "module",
                globals: {
                  window: "readonly",
                  document: "readonly",
                  console: "readonly",
                  fetch: "readonly",
                  setTimeout: "readonly",
                  clearTimeout: "readonly",
                  localStorage: "readonly",
                  sessionStorage: "readonly",
                  HTMLElement: "readonly",
                  HTMLAnchorElement: "readonly",
                  HTMLAreaElement: "readonly",
                  HTMLImageElement: "readonly",
                  HTMLMediaElement: "readonly",
                  URL: "readonly",
                  URLSearchParams: "readonly",
                  CustomEvent: "readonly",
                  FormData: "readonly",
                  Event: "readonly",
                  DOMPurify: "readonly",
                  confirm: "readonly",
                  alert: "readonly",
                  self: "readonly",
                },
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error",
              },
            },
          ];
          ESLINTEOF