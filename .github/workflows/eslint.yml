- name: Create ESLint config
        run: |
          cat > eslint.config.mjs << 'EOF'
          import js from "@eslint/js";
          export default [
            js.configs.recommended,
            {
              languageOptions: {
                ecmaVersion: 2022,
                sourceType: "module",
                globals: {
                  window: "readonly",
                  document: "readonly",
                  console: "readonly",
                  fetch: "readonly",
                  setTimeout: "readonly",
                  clearTimeout: "readonly",
                  localStorage: "readonly",
                  sessionStorage: "readonly",
                },
              },
              rules: {
                "no-unused-vars": "warn",
                "no-undef": "error",
              },
            },
          ];
          EOF

      - name: Run ESLint
        run: npx eslint "nginx/frontend/**/*.js"